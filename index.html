<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon TCG Mobile</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 80px; }
        .hidden { display: none !important; }
        .page { padding: 15px; text-align: center; min-height: 100vh; }
        
        /* JAVÍTOTT: POKÉMON KÁRTYA ALAKÚ RÁCS */
        .deck-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            padding: 10px; 
        }
        @media (min-width: 600px) { .deck-grid { grid-template-columns: repeat(4, 1fr); } }

        /* JAVÍTOTT: TÉGLALAP ALAKÚ KÁRTYA DESIGN */
        .mini-card { 
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); 
            border: 3px solid #ffde00; 
            border-radius: 12px; 
            color: black; 
            padding: 8px; 
            font-size: 13px; 
            position: relative; 
            text-align: left; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            /* Ez adja meg a klasszikus kártya arányt */
            aspect-ratio: 2.5 / 3.5; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .mini-card img { 
            width: 100%; 
            height: 55%; 
            object-fit: cover; 
            border-radius: 6px; 
            border: 1px solid rgba(0,0,0,0.2);
            background: white;
        }

        .card-info { flex-grow: 1; padding-top: 5px; }
        .del-btn { background: #ff4444; color: white; border: none; font-size: 10px; padding: 5px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; }
        .buy-btn { background: #2ecc71; color: white; border: none; font-size: 10px; padding: 5px; border-radius: 5px; width: 100%; font-weight: bold; }

        /* UI ELEMEK */
        .ui-box { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        input, textarea { width: 90%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; background: #2a2a2a; color: white; font-size: 16px; }
        .btn { background: #ffcb05; color: #3c5aa6; border: 2px solid #3c5aa6; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; }

        /* ALSÓ NAVBAR */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #333; z-index: 1000; }
        .nav-item { color: #888; font-size: 12px; background: none; border: none; text-align: center; cursor: pointer; }
        .nav-item.active { color: #ffcb05; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginPage" class="page">
        <h1 style="color:#ffcb05; margin-top: 50px;">POKÉMON LOGIN</h1>
        <input type="text" id="uName" placeholder="Felhasználónév">
        <input type="password" id="uPass" placeholder="Jelszó">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <div id="editorPage" class="page hidden">
        <div class="ui-box">
            <h3>🎨 Kártya Szerkesztő</h3>
            <input type="text" id="inName" placeholder="Pokémon neve">
            <input type="number" id="inHP" placeholder="HP">
            <input type="file" id="fileIn" accept="image/*" onchange="loadImg(this)">
            <button class="btn" style="margin-top:15px;" onclick="save()">MENTÉS (50 🪙)</button>
        </div>
    </div>

    <div id="deckPage" class="page hidden">
        <h3>🎒 PAKLID (<span class="coins">0</span> 🪙)</h3>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <div id="shopPage" class="page hidden">
        <h3>🛒 SHOP</h3>
        <div class="ui-box">
            <h4>📅 Napi Ajándék</h4>
            <button id="dailyBtn" class="btn" onclick="claimDaily()">200 🪙 ÁTVÉTELE</button>
        </div>
        <div id="shopList" class="deck-grid"></div>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item active" onclick="tab('editorPage', this)">🎨<br>Szerkesztő</button>
        <button class="nav-item" onclick="tab('deckPage', this)">🎒<br>Pakli</button>
        <button class="nav-item" onclick="tab('shopPage', this)">🛒<br>Shop</button>
    </nav>

<script>
    let player = null;
    let tempPic = "";
    
    const shopItems = [
        { name: "Pikachu", hp: 60, img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png", price: 200 },
        { name: "Charizard", hp: 120, img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png", price: 500 },
        { name: "Mewtwo", hp: 150, img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png", price: 800 }
    ];

    function tab(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(b) b.classList.add('active');
        if(id === 'deckPage') renderDeck();
        if(id === 'shopPage') renderShop();
    }

    function loadImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { tempPic = e.target.result; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // JAVÍTOTT AUTH: Betölti a mentett kártyákat bejelentkezéskor
    function auth() {
        const u = document.getElementById('uName').value.trim().toLowerCase();
        const p = document.getElementById('uPass').value;
        if(!u || !p) return alert("Adj meg nevet és jelszót!");
        
        let data = JSON.parse(localStorage.getItem('pk_save_' + u));
        
        if (data && data.password !== p) {
            return alert("Hibás jelszó ehhez a névhez!");
        }

        player = data || { username: u, password: p, money: 500, deck: [], lastDaily: "" };
        
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        
        updateCoins();
        tab('deckPage', document.querySelectorAll('.nav-item')[1]);
    }

    function save() {
        const nameVal = document.getElementById('inName').value;
        const hpVal = document.getElementById('inHP').value;
        
        if(!nameVal) return alert("Adj meg nevet!");
        if(!tempPic) return alert("Válassz ki egy fotót!");
        if(player.money < 50) return alert("Nincs elég pénzed!");

        player.money -= 50;
        player.deck.push({ name: nameVal, hp: hpVal || 0, img: tempPic });
        
        document.getElementById('inName').value = "";
        document.getElementById('inHP').value = "";
        tempPic = "";
        
        sync(); 
        updateCoins(); 
        alert("Kártya elmentve!");
    }

    function renderDeck() {
        const list = document.getElementById('deckList');
        list.innerHTML = "";
        player.deck.forEach((c, i) => {
            list.innerHTML += `
                <div class="mini-card">
                    <img src="${c.img}">
                    <div class="card-info">
                        <b>${c.name}</b><br>
                        <small>HP: ${c.hp}</small>
                    </div>
                    <button class="del-btn" onclick="removeCard(${i})">Törlés (+25🪙)</button>
                </div>`;
        });
    }

    function removeCard(i) {
        player.deck.splice(i, 1);
        player.money += 25;
        sync(); renderDeck(); updateCoins();
    }

    function claimDaily() {
        const today = new Date().toDateString();
        if(player.lastDaily === today) return alert("Ma már átvetted!");
        player.money += 200;
        player.lastDaily = today;
        sync(); updateCoins(); alert("200 🪙 megérkezett!");
    }

    function renderShop() {
        const list = document.getElementById('shopList');
        list.innerHTML = "";
        shopItems.forEach(item => {
            list.innerHTML += `
                <div class="mini-card">
                    <img src="${item.img}">
                    <div class="card-info">
                        <b>${item.name}</b><br>
                        ${item.price} 🪙
                    </div>
                    <button class="buy-btn" onclick="buyItem('${item.name}', ${item.hp}, '${item.img}', ${item.price})">MEGVESZ</button>
                </div>`;
        });
    }

    function buyItem(name, hp, img, price) {
        if(player.money < price) return alert("Nincs elég pénzed!");
        player.money -= price;
        player.deck.push({ name, hp, img });
        sync(); updateCoins(); alert("Sikeres vásárlás!");
    }

    function updateCoins() { 
        document.querySelectorAll('.coins').forEach(e => e.innerText = player.money); 
    }
    
    function sync() { 
        localStorage.setItem('pk_save_' + player.username, JSON.stringify(player)); 
    }
</script>
</body>
</html>
