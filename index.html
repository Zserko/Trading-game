<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Ipari Online</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:#222;
border-radius:15px;
padding:10px;
margin:10px;
display:inline-block;
width:150px;
}

img{
width:100%;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#ffcb05;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
}

</style>

</head>
<body>

<h1>Ipari Online</h1>

<div id="login">

<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="jelszó">

<br><br>

<button onclick="register()">Regisztráció</button>
<button onclick="login()">Belépés</button>

</div>

<div id="game" style="display:none">

<h2>Kártya készítés</h2>

<input id="cardName" placeholder="kártya név">
<input id="cardHP" placeholder="HP">
<input id="cardImg" placeholder="kép URL">

<br><br>

<button onclick="createCard()">Mentés</button>

<h2>Album</h2>

<div id="album"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD6g6AKHiOCugYhjmZP1XTHELUgXSwrAII",
authDomain: "game-61125.firebaseapp.com",
projectId: "game-61125",
storageBucket: "game-61125.firebasestorage.app",
messagingSenderId: "1090065809070",
appId: "1:1090065809070:web:7dce645922028fff29773f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore(app);

window.register = async function(){

const email=document.getElementById("email").value
const pass=document.getElementById("pass").value

await createUserWithEmailAndPassword(auth,email,pass)

alert("Regisztrálva!")

}

window.login = async function(){

const email=document.getElementById("email").value
const pass=document.getElementById("pass").value

await signInWithEmailAndPassword(auth,email,pass)

document.getElementById("login").style.display="none"
document.getElementById("game").style.display="block"

loadCards()

}

window.createCard = async function(){

const name=document.getElementById("cardName").value
const hp=document.getElementById("cardHP").value
const img=document.getElementById("cardImg").value

await addDoc(collection(db,"cards"),{
name:name,
hp:hp,
img:img
})

alert("kártya mentve")

loadCards()

}

async function loadCards(){

const querySnapshot = await getDocs(collection(db,"cards"))

const album=document.getElementById("album")

album.innerHTML=""

querySnapshot.forEach((doc)=>{

const c=doc.data()

album.innerHTML+=`
<div class="card">
<h3>${c.name}</h3>
<img src="${c.img}">
<p>HP ${c.hp}</p>
</div>
`

})

}

</script>

</body>
</html>
