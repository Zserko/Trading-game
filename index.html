<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon TCG Pocket</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; margin: 0; padding-bottom: 100px; }
        .hidden { display: none !important; }
        .page { padding: 20px; text-align: center; min-height: 100vh; }

        /* NAGY KÁRTYA STÍLUS */
        .deck-grid { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .big-card { 
            background: linear-gradient(145deg, #ffd700, #ff8c00); 
            border: 6px solid #fff; border-radius: 25px; color: black; padding: 15px; 
            width: 85%; max-width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            text-align: left; position: relative;
        }
        .big-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 15px; border: 3px solid #333; background: white; }
        .hp-badge { float: right; color: #d32f2f; font-weight: bold; font-size: 20px; }

        /* PROFIL ÉS SZERKESZTŐ */
        .profile-header { background: #1e1e1e; padding: 30px; border-radius: 30px; margin-bottom: 20px; border: 2px solid #333; }
        .prof-pic { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #ffcb05; cursor: pointer; background: #333; }
        
        /* GOMBOK ÉS INPUTOK */
        .btn { background: #ffcb05; color: #3c5aa6; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; font-size: 16px; box-shadow: 0 4px 0 #b38f00; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b38f00; }
        .btn-red { background: #ff4444; color: white; box-shadow: 0 4px 0 #cc0000; }
        .login-input { width: 85%; padding: 15px; border-radius: 12px; border: 2px solid #ffcb05; background: #222; color: white; font-size: 20px; text-align: center; margin-bottom: 20px; }

        /* NAVBAR */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid #333; z-index: 1000; }
        .nav-item { color: #888; background: none; border: none; font-size: 14px; cursor: pointer; }
        .nav-item.active { color: #ffcb05; font-weight: bold; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; padding: 25px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div id="cardModal" class="modal hidden" onclick="this.classList.add('hidden')">
        <div class="modal-content" id="modalData" onclick="event.stopPropagation()"></div>
    </div>

    <div id="loginPage" class="page">
        <h1 style="color:#ffcb05; font-size: 45px; margin-top: 80px;">TCG POCKET</h1>
        <p style="color:#aaa;">Üdvözlünk! Ki vagy Te?</p>
        <input type="text" id="uName" class="login-input" placeholder="Neved helye...">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <div id="deckPage" class="page hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0;">🎒 Paklid</h2>
            <div style="background:#ffcb05; color:black; padding:5px 15px; border-radius:20px; font-weight:bold;"><span id="coinCount">0</span> 🪙</div>
        </div>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <div id="editorPage" class="page hidden">
        <h2>🎨 Új Kártya</h2>
        <div class="big-card" style="margin: 0 auto 20px auto;">
            <div id="eHp" class="hp-badge" onclick="ask('eHpVal','HP mennyisége')">HP 0</div>
            <div id="eName" style="font-size:20px; font-weight:bold; margin-bottom:10px;" onclick="ask('eNameVal','Pokémon neve')">Név helye...</div>
            <div style="height:200px; background:white; border-radius:10px; display:flex; align-items:center; justify-content:center; overflow:hidden;" onclick="document.getElementById('fileIn').click()">
                <img id="eImg" style="display:none;">
                <span id="ePlc" style="color:#666;">➕ KÉP FELTÖLTÉSE</span>
            </div>
            <div id="eAdv" style="margin-top:10px; font-size:14px; background:rgba(255,255,255,0.2); padding:10px; border-radius:10px;" onclick="ask('eAdvVal','Képesség leírása')">Kattints a leíráshoz...</div>
            <input type="file" id="fileIn" class="hidden" onchange="loadCardImg(this)">
            <input type="hidden" id="eNameVal"><input type="hidden" id="eHpVal"><input type="hidden" id="eAdvVal">
        </div>
        <button class="btn" onclick="saveNewCard()">KÁRTYA MENTÉSE (50 🪙)</button>
    </div>

    <div id="profilePage" class="page hidden">
        <div class="profile-header">
            <img id="pPic" class="prof-pic" src="https://via.placeholder.com/120" onclick="document.getElementById('pIn').click()">
            <input type="file" id="pIn" class="hidden" onchange="loadProfilePic(this)">
            <h2 id="pName" style="margin:15px 0 5px 0;">Név</h2>
            <p style="color:#888; margin:0;">Kattints a képre a módosításhoz</p>
        </div>
        <button class="btn btn-red" onclick="location.reload()">KIJELENTKEZÉS</button>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item active" onclick="tab('deckPage', this)">🎒 Pakli</button>
        <button class="nav-item" onclick="tab('editorPage', this)">🎨 Készítő</button>
        <button class="nav-item" onclick="tab('profilePage', this)">👤 Profil</button>
    </nav>

<script>
    let player = null;
    let tempImg = "";

    function auth() {
        const name = document.getElementById('uName').value.trim();
        if(!name) return;
        let data = JSON.parse(localStorage.getItem('tcg_v6_' + name.toLowerCase()));
        player = data || { username: name, money: 500, deck: [], pPic: "" };
        
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        updateUI();
        tab('deckPage', document.querySelectorAll('.nav-item')[0]);
    }

    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(btn) btn.classList.add('active');
        if(id === 'deckPage') renderDeck();
    }

    function updateUI() {
        document.getElementById('coinCount').innerText = player.money;
        document.getElementById('pName').innerText = player.username;
        if(player.pPic) document.getElementById('pPic').src = player.pPic;
    }

    function save() {
        localStorage.setItem('tcg_v6_' + player.username.toLowerCase(), JSON.stringify(player));
    }

    // KÁRTYA KÉSZÍTÉS
    function ask(id, txt) {
        let val = prompt(txt);
        if(val) {
            document.getElementById(id).value = val;
            if(id === 'eHpVal') document.getElementById('eHp').innerText = "HP " + val;
            if(id === 'eNameVal') document.getElementById('eName').innerText = val;
            if(id === 'eAdvVal') document.getElementById('eAdv').innerText = val;
        }
    }

    function loadCardImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            tempImg = e.target.result;
            document.getElementById('eImg').src = tempImg;
            document.getElementById('eImg').style.display = 'block';
            document.getElementById('ePlc').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveNewCard() {
        const name = document.getElementById('eNameVal').value;
        if(!name || !tempImg) return alert("Adj nevet és tölts fel képet!");
        if(player.money < 50) return alert("Nincs elég pénzed!");

        player.money -= 50;
        player.deck.push({
            name: name,
            hp: document.getElementById('eHpVal').value || 0,
            adv: document.getElementById('eAdvVal').value || "Nincs leírás",
            img: tempImg
        });
        
        save(); // MENTÉS
        alert("Kártya elmentve!");
        tab('deckPage', document.querySelectorAll('.nav-item')[0]);
    }

    // PROFILKÉP MENTÉSE
    function loadProfilePic(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            player.pPic = e.target.result;
            document.getElementById('pPic').src = player.pPic;
            save(); // AZONNALI MENTÉS
        };
        reader.readAsDataURL(input.files[0]);
    }

    function renderDeck() {
        const list = document.getElementById('deckList');
        list.innerHTML = player.deck.length ? "" : "<p>Még nincs kártyád. Készíts egyet!</p>";
        player.deck.forEach((c, i) => {
            list.innerHTML += `
                <div class="big-card" onclick="openCard(${i})">
                    <div class="hp-badge">HP ${c.hp}</div>
                    <div style="font-size:20px; font-weight:bold; margin-bottom:10px;">${c.name}</div>
                    <img src="${c.img}">
                    <div style="margin-top:10px; font-size:14px; background:rgba(255,255,255,0.2); padding:10px; border-radius:10px;">${c.adv}</div>
                </div>
            `;
        });
        updateUI();
    }

    function openCard(i) {
        const c = player.deck[i];
        const modal = document.getElementById('cardModal');
        modal.classList.remove('hidden');
        document.getElementById('modalData').innerHTML = `
            <img src="${c.img}" style="width:100%; border-radius:15px; border:3px solid gold;">
            <h2 style="color:white; margin:15px 0;">${c.name}</h2>
            <button class="btn" onclick="upgradeCard(${i})">🆙 FEJLESZTÉS (150 🪙)</button>
            <button class="btn btn-red" onclick="sellCard(${i})">💰 ELADÁS (75 🪙)</button>
        `;
    }

    function upgradeCard(i) {
        if(player.money < 150) return alert("Nincs elég pénzed!");
        player.money -= 150;
        player.deck[i].hp = parseInt(player.deck[i].hp) + 100;
        save(); renderDeck(); document.getElementById('cardModal').classList.add('hidden');
    }

    function sellCard(i) {
        player.money += 75;
        player.deck.splice(i, 1);
        save(); renderDeck(); document.getElementById('cardModal').classList.add('hidden');
    }
</script>
</body>
</html>
