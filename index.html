<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon TCG Social</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .page { padding: 15px; text-align: center; min-height: 100vh; }
        
        /* KÁRTYA MEGJELENÉS */
        .deck-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px; }
        .mini-card { 
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); 
            border: 3px solid #ffde00; border-radius: 12px; color: black; padding: 8px; 
            font-size: 11px; position: relative; text-align: left; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); aspect-ratio: 2.5 / 3.8; 
            display: flex; flex-direction: column; cursor: pointer;
        }
        .mini-card img { width: 100%; height: 50%; object-fit: cover; border-radius: 6px; background: white; border: 1px solid #999; }

        /* JAVÍTOTT: GÖRGETHETŐ MODAL / POPUP */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .modal-content { 
            background: #1e1e1e; padding: 20px; border-radius: 20px; width: 90%; 
            max-width: 400px; max-height: 80vh; /* Maximum magasság */
            overflow-y: auto; /* Belső görgetés engedélyezése */
            text-align: center; border: 2px solid #333; 
            position: relative;
        }

        /* PROFIL & BARÁTOK */
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #ffcb05; margin-bottom: 10px; background: #333; }
        .friend-item { background: #2a2a2a; padding: 10px; border-radius: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .friend-info { display: flex; align-items: center; gap: 10px; }
        .friend-pic-small { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #444; }

        /* GOMBOK */
        .btn { background: #ffcb05; color: #3c5aa6; border: 2px solid #3c5aa6; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-red { background: #ff4444; color: white; border: none; }
        .btn-blue { background: #3498db; color: white; border: none; }

        /* NAVBAR */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #333; z-index: 1000; }
        .nav-item { color: #888; font-size: 10px; background: none; border: none; text-align: center; cursor: pointer; }
        .nav-item.active { color: #ffcb05; font-weight: bold; }

        /* VIZUÁLIS SZERKESZTŐ */
        .visual-editor { background: linear-gradient(to bottom, #e0e0e0, #a0a0a0); border: 10px solid #fcd33b; border-radius: 15px; width: 100%; max-width: 300px; aspect-ratio: 2.5/3.5; margin: 0 auto; position: relative; color: black; padding: 10px; box-sizing: border-box; }
        .ve-label { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="cardModal" class="modal hidden" onclick="closeModal(event)">
        <div class="modal-content" id="modalData" onclick="event.stopPropagation()">
            </div>
    </div>

    <div id="loginPage" class="page">
        <h1 style="color:#ffcb05; margin-top: 50px;">POKÉMON LOGIN</h1>
        <input type="text" id="uName" placeholder="Felhasználónév" style="width:80%; padding:15px; margin:10px; border-radius: 10px; border:none;">
        <input type="password" id="uPass" placeholder="Jelszó" style="width:80%; padding:15px; margin:10px; border-radius: 10px; border:none;">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <div id="editorPage" class="page hidden">
        <h3>🎨 Kártya Készítő</h3>
        <div class="visual-editor">
            <div onclick="askData('inName', 'Pokémon neve', 'dispName')"><div class="ve-label">NÉV:</div> ✏️ <span id="dispName">...</span></div>
            <div onclick="askData('inHP', 'HP mennyisége', 'dispHP')" style="text-align: right;"><div class="ve-label">HP:</div> ✏️ <span id="dispHP">0</span></div>
            <div style="height:45%; background:white; margin:10px 0; border: 2px solid #555; display: flex; align-items: center; justify-content: center; overflow: hidden;" onclick="document.getElementById('fileIn').click()">
                <img id="dispImg" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span id="imgPlaceholder" style="color: #666; font-size: 20px;">➕ FOTÓ</span>
            </div>
            <div onclick="askData('inAdv', 'Képesség leírása', 'dispAdv')"><div class="ve-label">KÉPESSÉG:</div> ✏️ <span id="dispAdv" style="font-size: 10px;">Érintsd meg...</span></div>
            <input type="hidden" id="inName"><input type="hidden" id="inHP"><input type="hidden" id="inAdv">
            <input type="file" id="fileIn" class="hidden" onchange="loadImg(this)">
        </div>
        <button class="btn" onclick="save()">MENTÉS (50 🪙)</button>
    </div>

    <div id="deckPage" class="page hidden">
        <h3>🎒 PAKLID (<span class="coins">0</span> 🪙)</h3>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <div id="friendsPage" class="page hidden">
        <h3>👥 BARÁTOK</h3>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-blue" onclick="inviteFriend()">KÓDOM</button>
            <button class="btn" onclick="addFriend()">HOZZÁADÁS</button>
        </div>
        <div id="friendsList" style="margin-top:20px; text-align: left;"></div>
    </div>

    <div id="profilePage" class="page hidden">
        <h3>👤 PROFIL</h3>
        <div class="ui-box" style="background: #1e1e1e; padding: 20px; border-radius: 20px;">
            <img id="profPicDisp" class="profile-pic" src="https://via.placeholder.com/100" onclick="document.getElementById('profFile').click()">
            <input type="file" id="profFile" class="hidden" onchange="loadProfPic(this)">
            <h2 id="profNameDisp">Felhasználó</h2>
            <button class="btn btn-blue" style="width: 60%;" onclick="rename()">NÉV MÓDOSÍTÁSA</button>
        </div>
        <div style="margin-top: 20px; font-size: 18px;">
            🪙 Érmék: <span class="coins">0</span><br>
            🃏 Kártyák: <span id="statCards">0</span>
        </div>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item active" onclick="tab('editorPage', this)">🎨 Készítő</button>
        <button class="nav-item" onclick="tab('deckPage', this)">🎒 Pakli</button>
        <button class="nav-item" onclick="tab('friendsPage', this)">👥 Barátok</button>
        <button class="nav-item" onclick="tab('profilePage', this)">👤 Profil</button>
    </nav>

<script>
    let player = null;
    let tempPic = "";

    function auth() {
        const u = document.getElementById('uName').value.trim().toLowerCase();
        const p = document.getElementById('uPass').value;
        if(!u) return alert("Adj meg egy nevet!");
        let data = JSON.parse(localStorage.getItem('pk_vFinal_v3_' + u));
        player = data || { username: u, password: p, money: 500, deck: [], friends: [], pPic: "" };
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        updateUI();
        tab('deckPage', document.querySelectorAll('.nav-item')[1]);
    }

    function tab(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(b) b.classList.add('active');
        if(id === 'deckPage') renderDeck();
        if(id === 'friendsPage') renderFriends();
        if(id === 'profilePage') updateUI();
    }

    /* KÁRTYA INTERAKCIÓK */
    function openCard(i) {
        const c = player.deck[i];
        const modal = document.getElementById('cardModal');
        const content = document.getElementById('modalData');
        modal.classList.remove('hidden');
        content.innerHTML = `
            <div style="background: white; border-radius: 10px; padding: 5px; margin-bottom: 15px;">
                <img src="${c.img}" style="width:100%; border-radius:5px;">
            </div>
            <h2 style="color: #ffcb05; margin: 5px 0;">${c.name}</h2>
            <div style="background: #333; padding: 10px; border-radius: 10px; margin-bottom: 15px;">
                <p><b>HP:</b> ${c.hp}</p>
                <p><b>Képesség:</b> ${c.adv}</p>
            </div>
            <button class="btn btn-blue" onclick="upgradeCard(${i})">🆙 UPGRADE (+100HP) <br><small>Ára: 150 🪙</small></button>
            <button class="btn btn-red" onclick="quickSell(${i})">💰 QUICKSELL <br><small>Kapsz: 75 🪙</small></button>
            <button class="btn" style="background: #444; color: white; border: none;" onclick="document.getElementById('cardModal').classList.add('hidden')">VISSZA</button>
            <div style="height: 20px;"></div> `;
    }

    function closeModal(e) { if(e.target.id === 'cardModal') e.target.classList.add('hidden'); }

    function upgradeCard(i) {
        if(player.money < 150) return alert("Nincs elég pénzed a fejlesztéshez!");
        player.money -= 150;
        player.deck[i].hp = parseInt(player.deck[i].hp) + 100;
        sync(); openCard(i); updateUI();
    }

    function quickSell(i) {
        if(!confirm("Biztosan eladod ezt a kártyát 75 érméért?")) return;
        player.money += 75;
        player.deck.splice(i, 1);
        document.getElementById('cardModal').classList.add('hidden');
        sync(); renderDeck(); updateUI();
    }

    /* PROFIL ÉS BARÁTOK */
    function rename() {
        let n = prompt("Írd be az új neved:", player.username);
        if(n) { player.username = n; sync(); updateUI(); }
    }

    function inviteFriend() {
        const code = btoa(JSON.stringify({n: player.username, d: player.deck.slice(0,3), p: player.pPic}));
        navigator.clipboard.writeText(code);
        alert("A barátkódodat kimásoltuk! Küldd el a barátodnak, hogy hozzáadhasson.");
    }

    function addFriend() {
        let code = prompt("Illeszd be a barátodtól kapott kódot:");
        if(code) {
            try {
                let fData = JSON.parse(atob(code));
                player.friends.push(fData);
                sync(); renderFriends();
                alert(fData.n + " hozzáadva a barátaidhoz!");
            } catch(e) { alert("Hiba! Ez nem egy érvényes barátkód."); }
        }
    }

    function renderFriends() {
        const list = document.getElementById('friendsList');
        list.innerHTML = player.friends.length ? "" : "<p style='text-align:center;'>Még nincsenek barátaid.</p>";
        player.friends.forEach((f, i) => {
            list.innerHTML += `
                <div class="friend-item">
                    <div class="friend-info">
                        <img src="${f.p : 'https://via.placeholder.com/40'}" class="friend-pic-small">
                        <b>${f.n}</b>
                    </div>
                    <button class="btn btn-blue" style="width:auto; margin:0; padding: 5px 15px;" onclick="viewFriendDeck(${i})">PAKLI</button>
                </div>`;
        });
    }

    function viewFriendDeck(i) {
        const f = player.friends[i];
        let names = f.d.map(c => c.name).join(", ");
        alert(f.n + " legfrissebb kártyái: " + (names || "még nincs kártyája"));
    }

    /* ALAP FUNKCIÓK */
    function askData(id, txt, disp) {
        let a = prompt("Add meg a következőt: " + txt);
        if(a) { document.getElementById(id).value = a; document.getElementById(disp).innerText = a; }
    }

    function loadImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                tempPic = e.target.result; 
                document.getElementById('dispImg').src = tempPic;
                document.getElementById('dispImg').style.display = 'block';
                document.getElementById('imgPlaceholder').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function loadProfPic(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { player.pPic = e.target.result; sync(); updateUI(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function save() {
        const name = document.getElementById('inName').value;
        if(!tempPic || !name) return alert("Név és fotó kötelező!");
        if(player.money < 50) return alert("Nincs elég érméd (50 🪙)!");
        player.money -= 50;
        player.deck.push({ 
            name: name, 
            hp: document.getElementById('inHP').value || "0", 
            adv: document.getElementById('inAdv').value || "Nincs leírás", 
            img: tempPic 
        });
        sync(); updateUI(); alert("Kártya sikeresen létrehozva!");
        tab('deckPage', document.querySelectorAll('.nav-item')[1]);
    }

    function renderDeck() {
        const list = document.getElementById('deckList');
        list.innerHTML = "";
        player.deck.forEach((c, i) => {
            list.innerHTML += `<div class="mini-card" onclick="openCard(${i})"><img src="${c.img}"><b>${c.name}</b><small>HP: ${c.hp}</small></div>`;
        });
    }

    function updateUI() {
        document.querySelectorAll('.coins').forEach(e => e.innerText = player.money);
        document.getElementById('profNameDisp').innerText = player.username;
        document.getElementById('statCards').innerText = player.deck.length;
        if(player.pPic) document.getElementById('profPicDisp').src = player.pPic;
    }

    function sync() { localStorage.setItem('pk_vFinal_v3_' + player.username, JSON.stringify(player)); }
</script>
</body>
</html>
