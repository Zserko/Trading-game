<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ipari Royale 1v1</title>
    <style>
        :root {
            --common: #b1b1b1; --uncommon: #55ee55; --rare: #55ccff; 
            --epic: #ee55ff; --legendary: #ffff55; --royale-blue: #1e3799;
            --royale-gold: #fbc531;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: radial-gradient(circle, #2f3640, #1e272e); 
            color: white; margin: 0; padding-top: 70px; padding-bottom: 110px;
            overflow-x: hidden; touch-action: pan-y;
        }
        .hidden { display: none !important; }

        /* CLASH ROYALE TOP BAR */
        .top-bar { 
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, #4a69bd, #1e3799);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; border-bottom: 4px solid var(--royale-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .money-badge {
            background: rgba(0,0,0,0.4); padding: 5px 20px; border-radius: 20px;
            border: 2px solid var(--royale-gold); font-weight: 900; font-size: 18px;
            color: var(--royale-gold);
        }

        /* 4 OSZLOPOS POKEMON/ROYALE RÁCS */
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; }
        .mini-card { 
            aspect-ratio: 2.5/3.8; background: #353b48; 
            border: 2px solid var(--common); border-radius: 10px;
            overflow: hidden; position: relative; transition: transform 0.1s;
            box-shadow: 0 3px 0 rgba(0,0,0,0.3);
        }
        .mini-card img { width: 100%; height: 50%; object-fit: cover; }
        .mini-content { padding: 3px; font-size: 7.5px; font-weight: 800; line-height: 1.1; }
        .mini-desc { font-size: 5.5px; color: #aaa; font-weight: normal; margin-top: 2px; }
        .locked { filter: grayscale(1) brightness(0.3); }

        /* EDITOR NAGY KÁRTYA */
        .big-card { 
            background: #2f3640; border: 6px solid var(--common); border-radius: 25px;
            width: 260px; aspect-ratio: 2.5/3.8; margin: 0 auto; position: relative;
            overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.6); text-align: left;
        }
        .img-container { 
            width: 90%; height: 160px; margin: 5% auto; border-radius: 15px;
            background: #1e272e; overflow: hidden; position: relative; touch-action: none;
        }
        .img-container img { position: absolute; transform-origin: center; }

        /* BUTTONS - ROYALE STYLE */
        .btn {
            background: linear-gradient(to bottom, #44bd32, #192f17);
            color: white; border: none; border-radius: 12px;
            padding: 12px; font-weight: 900; width: 90%; cursor: pointer;
            text-transform: uppercase; font-size: 14px;
            box-shadow: 0 4px 0 #132412; transition: 0.1s; margin-top: 10px;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #132412; }
        .btn-blue { background: linear-gradient(to bottom, #0097e6, #005f91); box-shadow: 0 4px 0 #003d5c; }

        /* NAVBAR */
        .navbar { 
            position: fixed; bottom: 0; width: 100%; background: #2f3640;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 4px solid #1e272e; z-index: 1000;
        }
        .nav-item { color: #dcdde1; background: none; border: none; font-weight: 900; font-size: 10px; text-transform: uppercase; }
        .nav-item.active { color: var(--royale-gold); }

        .input-box { width: 85%; padding: 12px; border-radius: 10px; border: 3px solid #1e272e; background: #353b48; color: white; margin-bottom: 8px; font-weight: bold; }
        .friend-item { background: #353b48; padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 2px solid #1e272e; }
    </style>
</head>
<body>

<div id="topBar" class="top-bar hidden">
    <div class="money-badge"><span id="globalMoney">0</span> 🪙</div>
</div>

<div id="loginPage" class="page" style="padding-top: 50px;">
    <h1 style="color:var(--royale-gold); text-shadow: 2px 2px #000; font-size: 36px;">IPARI ROYALE</h1>
    <input type="text" id="uName" class="input-box" placeholder="FELHASZNÁLÓNÉV">
    <input type="password" id="uPass" class="input-box" placeholder="JELSZÓ">
    <button class="btn" onclick="auth()">BELÉPÉS</button>
</div>

<div id="deckPage" class="page hidden"><h2 style="color:var(--royale-gold)">PAKLI</h2><div id="deckList" class="card-grid"></div></div>
<div id="albumPage" class="page hidden"><h2 style="color:var(--royale-gold)">ALBUM</h2><div id="albumList" class="card-grid"></div></div>

<div id="friendsPage" class="page hidden">
    <h2 style="color:var(--royale-gold)">BARÁTOK</h2>
    <input type="text" id="friendID" class="input-box" placeholder="KÓD (PL: ABC-DEF)">
    <button class="btn btn-blue" onclick="addFriend()">HOZZÁADÁS</button>
    <div id="friendsList" style="margin-top: 20px;"></div>
</div>

<div id="friendView" class="page hidden">
    <button class="btn btn-blue" style="width:auto; padding: 5px 20px;" onclick="tab('friendsPage')">⬅ VISSZA</button>
    <div id="fProfileArea" style="margin-top:20px;"></div>
    <div id="fCardList" class="card-grid"></div>
</div>

<div id="editorPage" class="page hidden">
    <h2 style="color:var(--royale-gold)">KÉSZÍTŐ</h2>
    <div class="big-card" id="preview">
        <div id="pHPText" style="position:absolute; right:15px; top:10px; font-weight:900; color:#ff4444; font-size:18px;">0</div>
        <div id="pNameText" style="padding: 10px 15px 0 15px; font-weight:900; font-size:18px; color:var(--royale-gold);">NÉV...</div>
        <div class="img-container" id="cropBox">
            <img id="eImg" style="display:none; width:100%; top:0; left:0;">
            <span id="plus" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%); color:#7f8c8d;">NINCS KÉP</span>
        </div>
        <div id="pDescText" style="padding:0 15px; font-size:12px; color:#bdc3c7; line-height:1.2;">Leírás...</div>
        <div id="pRare" style="position:absolute; bottom:10px; width:100%; text-align:center; font-weight:900; font-size:12px;">COMMON</div>
    </div>
    <button class="btn btn-blue" onclick="document.getElementById('fileIn').click()">KÉP KIVÁLASZTÁSA</button>
    <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="loadImg(this)">
    <input type="text" id="iName" class="input-box" placeholder="NÉV" oninput="sync()">
    <input type="number" id="iHP" class="input-box" placeholder="HP" oninput="sync()">
    <input type="text" id="iDesc" class="input-box" placeholder="LEÍRÁS" oninput="sync()">
    <select id="iRare" class="input-box" onchange="sync()">
        <option value="Common">Common</option><option value="Uncommon">Uncommon</option><option value="Rare">Rare</option><option value="Epic">Epic</option><option value="Legendary">Legendary</option>
    </select>
    <button class="btn" onclick="saveCard()">MENTÉS (50 🪙)</button>
</div>

<div id="shopPage" class="page hidden">
    <h2 style="color:var(--royale-gold)">BOLT</h2>
    <button class="btn" onclick="claimDaily()">NAPI 200 🪙</button>
    <button class="btn btn-blue" onclick="openPack()">LÁDA NYITÁS (150 🪙)</button>
</div>

<div id="profilePage" class="page hidden">
    <h2 style="color:var(--royale-gold)">PROFIL</h2>
    <div style="background:#353b48; padding:20px; border-radius:20px; border:4px solid var(--royale-gold);">
        <h1 id="pNameDisp" style="margin:0;"></h1>
        <p style="color:#bdc3c7;">KÓDOD:</p>
        <h2 id="myID" style="letter-spacing:2px; color:white;"></h2>
        <button class="btn btn-blue" style="width:auto; padding:8px 20px;" onclick="copyID()">KÓD MÁSOLÁSA</button>
    </div>
    <button class="btn" style="background:linear-gradient(#e74c3c, #c0392b); margin-top:30px;" onclick="location.reload()">KIJELENTKEZÉS</button>
</div>

<nav class="navbar hidden" id="menu">
    <button class="nav-item active" onclick="tab('deckPage', this)">🎒 Pakli</button>
    <button class="nav-item" onclick="tab('albumPage', this)">📖 Album</button>
    <button class="nav-item" onclick="tab('friendsPage', this)">👥 Barátok</button>
    <button class="nav-item" onclick="tab('shopPage', this)">🛒 Bolt</button>
    <button class="nav-item" onclick="tab('editorPage', this)">🎨 Készítő</button>
    <button class="nav-item" onclick="tab('profilePage', this)">👤 Profil</button>
</nav>

<script>
    let player, posX=0, posY=0, startX=0, startY=0, isDragging=false;
    const G_KEY = "global_cards_v15";

    function generateUID() {
        const c = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        const r = () => Array.from({length:3}, () => c[Math.floor(Math.random()*c.length)]).join('');
        return r() + "-" + r();
    }

    function auth() {
        const u = document.getElementById('uName').value.trim().toUpperCase();
        const p = document.getElementById('uPass').value;
        if(!u || !p) return;
        let d = JSON.parse(localStorage.getItem('u_'+u));
        player = (d && d.password === p) ? d : { username: u, password: p, money: 500, deck: [], uid: generateUID(), ld: 0, friends: [] };
        localStorage.setItem('uid_'+player.uid, u);
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('topBar').classList.remove('hidden');
        document.getElementById('menu').classList.remove('hidden');
        tab('deckPage');
    }

    const cropBox = document.getElementById('cropBox'), eImg = document.getElementById('eImg');
    const moveH = (e) => {
        if(!isDragging) return;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        posX = cx - startX; posY = cy - startY;
        eImg.style.left = posX + "px"; eImg.style.top = posY + "px";
    };
    cropBox.addEventListener('touchstart', e => { isDragging=true; startX=e.touches[0].clientX-posX; startY=e.touches[0].clientY-posY; });
    cropBox.addEventListener('touchmove', e => { e.preventDefault(); moveH(e); });
    window.addEventListener('touchend', () => isDragging=false);
    cropBox.addEventListener('mousedown', e => { isDragging=true; startX=e.clientX-posX; startY=e.clientY-posY; });
    window.addEventListener('mousemove', moveH);
    window.addEventListener('mouseup', () => isDragging=false);

    function loadImg(i) {
        const r = new FileReader();
        r.onload = (e) => { eImg.src = e.target.result; eImg.style.display="block"; document.getElementById('plus').style.display="none"; posX=0; posY=0; eImg.style.left="0px"; eImg.style.top="0px"; };
        r.readAsDataURL(i.files);
    }

    function saveCard() {
        if(player.money < 50 || eImg.style.display==='none') return alert("HIBA!");
        const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 250;
        const ratio = eImg.naturalWidth / eImg.width;
        ctx.drawImage(eImg, posX * ratio, posY * ratio, eImg.naturalWidth, eImg.naturalHeight);
        const card = { id: Date.now(), name: document.getElementById('iName').value.toUpperCase(), hp: document.getElementById('iHP').value, desc: document.getElementById('iDesc').value, rare: document.getElementById('iRare').value, img: canvas.toDataURL('image/jpeg', 0.6) };
        let g = JSON.parse(localStorage.getItem(G_KEY)) || []; g.push(card);
        localStorage.setItem(G_KEY, JSON.stringify(g));
        player.deck.push(card.id); player.money -= 50; save(); tab('deckPage');
    }

    function addFriend() {
        const id = document.getElementById('friendID').value.trim().toUpperCase();
        if(!localStorage.getItem('uid_'+id) || id === player.uid) return alert("HIBA!");
        if(!player.friends.includes(id)) { player.friends.push(id); save(); }
        document.getElementById('friendID').value = "";
    }

    function viewFriend(id) {
        const fU = localStorage.getItem('uid_'+id);
        const fD = JSON.parse(localStorage.getItem('u_'+fU));
        tab('friendView');
        document.getElementById('fProfileArea').innerHTML = `<h3>${fD.username}</h3><p>ID: ${id}</p><button class="btn" style="background:#e74c3c; width:120px;" onclick="removeFriend('${id}')">TÖRLÉS</button>`;
        drawCards('fCardList', false, fD.deck);
    }

    function removeFriend(id) { player.friends = player.friends.filter(f => f !== id); save(); tab('friendsPage'); }
    function save() { localStorage.setItem('u_'+player.username, JSON.stringify(player)); update(); }

    function drawCards(elId, album, filterList = null) {
        const g = JSON.parse(localStorage.getItem(G_KEY)) || [];
        const container = document.getElementById(elId); container.innerHTML = "";
        g.forEach(c => {
            const has = player.deck.includes(c.id);
            if(!album && filterList && !filterList.includes(c.id)) return;
            if(!album && !filterList && !has) return;
            const d = document.createElement('div');
            d.className = `mini-card ${(!has && album) ? 'locked' : ''}`;
            d.style.borderColor = `var(--${c.rare.toLowerCase()})`;
            d.innerHTML = `<img src="${c.img}"><div class="mini-content"><div>HP ${c.hp}</div><div>${c.name}</div><div class="mini-desc">${c.desc}</div></div>`;
            container.appendChild(d);
        });
    }

    function update() {
        document.getElementById('globalMoney').innerText = player.money;
        document.getElementById('pNameDisp').innerText = player.username;
        document.getElementById('myID').innerText = player.uid;
        const fList = document.getElementById('friendsList'); fList.innerHTML = "";
        player.friends.forEach(fid => {
            const fU = localStorage.getItem('uid_'+fid);
            fList.innerHTML += `<div class="friend-item" onclick="viewFriend('${fid}')"><span>${fU}</span><span>${fid} ➡</span></div>`;
        });
        drawCards('deckList', false); drawCards('albumList', true);
    }

    function tab(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(b) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); b.classList.add('active'); }
        update();
    }

    function sync() {
        document.getElementById('pNameText').innerText = document.getElementById('iName').value.toUpperCase() || "NÉV...";
        document.getElementById('pHPText').innerText = document.getElementById('iHP').value || 0;
        document.getElementById('pDescText').innerText = document.getElementById('iDesc').value || "Leírás...";
        document.getElementById('pRare').innerText = document.getElementById('iRare').value.toUpperCase();
        document.getElementById('preview').style.borderColor = `var(--${document.getElementById('iRare').value.toLowerCase()})`;
    }
    function copyID() { navigator.clipboard.writeText(player.uid); alert("MÁSOLVA!"); }
    function claimDaily() { if(Date.now()-player.ld < 86400000) return alert("VÁRJ!"); player.money+=200; player.ld=Date.now(); save(); }
    function openPack() { 
        let g=JSON.parse(localStorage.getItem(G_KEY))||[]; 
        if(!g.length || player.money<150) return alert("HIBA!");
        let c=g[Math.floor(Math.random()*g.length)];
        player.money-=150; if(!player.deck.includes(c.id)) player.deck.push(c.id);
        save(); alert("NYITOTTÁL: " + c.name);
    }
</script>
</body>
</html>
