<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon TCG Ultimate</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .page { padding: 15px; text-align: center; min-height: 100vh; }
        
        /* KÁRTYA STÍLUS */
        .deck-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px; }
        .mini-card { 
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); 
            border: 3px solid #ffde00; border-radius: 12px; color: black; padding: 8px; 
            font-size: 11px; position: relative; text-align: left; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); aspect-ratio: 2.5 / 3.8; 
            display: flex; flex-direction: column; cursor: pointer;
        }
        .mini-card img { width: 100%; height: 50%; object-fit: cover; border-radius: 6px; background: white; border: 1px solid #999; }

        /* MODAL (GÖRGETHETŐ) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .modal-content { 
            background: #1e1e1e; padding: 20px; border-radius: 20px; width: 90%; 
            max-width: 400px; max-height: 85vh; overflow-y: auto; 
            text-align: center; border: 2px solid #333; 
        }

        /* HARC TERÜLET */
        .battle-area { display: flex; flex-direction: column; gap: 10px; }
        .hp-bar { width: 100%; background: #444; height: 20px; border-radius: 10px; position: relative; border: 2px solid #ffcb05; }
        .hp-fill { background: #2ecc71; height: 100%; border-radius: 8px; transition: width 0.3s; width: 100%; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 12px; font-weight: bold; top: 1px; text-shadow: 1px 1px #000; }
        .battlefield { height: 160px; border: 2px dashed #444; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; border-radius: 15px; }

        /* NAVIGÁCIÓ */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #333; z-index: 1000; }
        .nav-item { color: #888; font-size: 10px; background: none; border: none; text-align: center; cursor: pointer; }
        .nav-item.active { color: #ffcb05; font-weight: bold; }

        /* GOMBOK */
        .btn { background: #ffcb05; color: #3c5aa6; border: 2px solid #3c5aa6; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 8px; }
        .btn-red { background: #ff4444; color: white; border: none; }
        .btn-blue { background: #3498db; color: white; border: none; }

        /* SZERKESZTŐ */
        .visual-editor { background: linear-gradient(to bottom, #e0e0e0, #a0a0a0); border: 8px solid #fcd33b; border-radius: 15px; width: 280px; aspect-ratio: 2.5/3.5; margin: 0 auto; color: black; padding: 10px; position: relative; }
    </style>
</head>
<body>

    <div id="cardModal" class="modal hidden" onclick="this.classList.add('hidden')">
        <div class="modal-content" id="modalData" onclick="event.stopPropagation()"></div>
    </div>

    <div id="loginPage" class="page">
        <h1 style="color:#ffcb05; margin-top: 50px;">POKÉMON TCG</h1>
        <input type="text" id="uName" placeholder="Felhasználónév" style="width:80%; padding:15px; margin:10px; border-radius:10px;">
        <input type="password" id="uPass" placeholder="Jelszó" style="width:80%; padding:15px; margin:10px; border-radius:10px;">
        <button class="btn" onclick="auth()">BELÉPÉS / REGISZTRÁCIÓ</button>
    </div>

    <div id="editorPage" class="page hidden">
        <h3>🎨 Kártya Készítő</h3>
        <div class="visual-editor">
            <div onclick="askData('inName', 'Név', 'dispName')">✏️ <span id="dispName">Név</span></div>
            <div onclick="askData('inHP', 'HP', 'dispHP')" style="text-align:right;">✏️ HP <span id="dispHP">0</span></div>
            <div style="height:50%; background:white; margin:10px 0; display:flex; align-items:center; justify-content:center;" onclick="document.getElementById('fileIn').click()">
                <img id="dispImg" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span id="imgPlc">➕ KÉP</span>
            </div>
            <div onclick="askData('inAdv', 'Képesség', 'dispAdv')">✏️ <span id="dispAdv">Képesség leírása...</span></div>
            <input type="file" id="fileIn" class="hidden" onchange="loadImg(this)">
            <input type="hidden" id="inName"><input type="hidden" id="inHP"><input type="hidden" id="inAdv">
        </div>
        <button class="btn" onclick="save()">MENTÉS (50 🪙)</button>
    </div>

    <div id="deckPage" class="page hidden">
        <h3>🎒 PAKLID (<span class="coins">0</span> 🪙)</h3>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <div id="battlePage" class="page hidden">
        <div class="battle-area">
            <h4 id="enemyName">Ellenfél</h4>
            <div class="hp-bar"><div id="enemyHpFill" class="hp-fill"></div><div id="enemyHpText" class="hp-text">1000/1000</div></div>
            <div id="enemyHand" style="display:flex; gap:5px; overflow-x:auto; height:80px;"></div>
            
            <div class="battlefield" id="battlefield"></div>
            
            <div class="hp-bar"><div id="myHpFill" class="hp-fill"></div><div id="myHpText" class="hp-text">1000/1000</div></div>
            <div id="myHand" style="display:flex; gap:5px; overflow-x:auto;"></div>
            <button class="btn btn-red" onclick="tab('deckPage')">MENEKÜLÉS</button>
        </div>
    </div>

    <div id="friendsPage" class="page hidden">
        <h3>👥 BARÁTOK</h3>
        <button class="btn btn-blue" onclick="inviteFriend()">KÓDOM MÁSOLÁSA</button>
        <button class="btn" onclick="addFriend()">BARÁT HOZZÁADÁSA</button>
        <div id="friendsList" style="margin-top:20px;"></div>
    </div>

    <div id="profilePage" class="page hidden">
        <h3>👤 PROFIL</h3>
        <img id="profPic" class="profile-pic" src="https://via.placeholder.com/100" style="width:100px; height:100px; border-radius:50%; border:3px solid gold;" onclick="document.getElementById('pIn').click()">
        <input type="file" id="pIn" class="hidden" onchange="loadProf(this)">
        <h2 id="pName">Név</h2>
        <div style="background:#222; padding:15px; border-radius:15px;">
            Érmék: <span class="coins">0</span> 🪙<br>
            Kártyák száma: <span id="pCount">0</span>
        </div>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item" onclick="tab('editorPage', this)">🎨 Készítő</button>
        <button class="nav-item active" onclick="tab('deckPage', this)">🎒 Pakli</button>
        <button class="nav-item" onclick="tab('friendsPage', this)">👥 Barátok</button>
        <button class="nav-item" onclick="tab('profilePage', this)">👤 Profil</button>
    </nav>

<script>
    let player = null;
    let tempPic = "";
    let bState = { myHp: 1000, eHp: 1000, myH: [], eH: [] };

    // AUTH & SYNC
    function auth() {
        const u = document.getElementById('uName').value.trim().toLowerCase();
        const p = document.getElementById('uPass').value;
        if(!u) return alert("Adj meg egy nevet!");
        let data = JSON.parse(localStorage.getItem('pk_vFinal_v5_' + u));
        player = data || { username: u, password: p, money: 500, deck: [], friends: [], pPic: "" };
        if(player.password !== p) return alert("Hibás jelszó!");
        
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        updateUI();
        tab('deckPage', document.querySelectorAll('.nav-item')[1]);
    }

    function sync() { localStorage.setItem('pk_vFinal_v5_' + player.username.toLowerCase(), JSON.stringify(player)); }

    function updateUI() {
        document.querySelectorAll('.coins').forEach(e => e.innerText = player.money);
        document.getElementById('pName').innerText = player.username;
        document.getElementById('pCount').innerText = player.deck.length;
        if(player.pPic) document.getElementById('profPic').src = player.pPic;
    }

    function tab(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(b) b.classList.add('active');
        if(id === 'deckPage') renderDeck();
        if(id === 'friendsPage') renderFriends();
        updateUI();
    }

    // KÁRTYA KEZELÉS
    function openCard(i) {
        const c = player.deck[i];
        const m = document.getElementById('cardModal');
        m.classList.remove('hidden');
        document.getElementById('modalData').innerHTML = `
            <img src="${c.img}" style="width:100%; border-radius:10px;">
            <h2>${c.name}</h2>
            <p>HP: ${c.hp} | ${c.adv}</p>
            <button class="btn btn-blue" onclick="upgrade(${i})">UPGRADE (+100HP) - 150🪙</button>
            <button class="btn btn-red" onclick="quicksell(${i})">QUICKSELL (+75🪙)</button>
        `;
    }

    function upgrade(i) {
        if(player.money < 150) return alert("Nincs elég pénzed!");
        player.money -= 150;
        player.deck[i].hp = parseInt(player.deck[i].hp) + 100;
        sync(); updateUI(); openCard(i);
    }

    function quicksell(i) {
        player.money += 75;
        player.deck.splice(i, 1);
        document.getElementById('cardModal').classList.add('hidden');
        sync(); renderDeck(); updateUI();
    }

    // HARC RENDSZER
    function startBattle(fIdx) {
        if(player.deck.length < 5) return alert("Legalább 5 lap kell a harchoz!");
        const f = player.friends[fIdx];
        bState = { myHp: 1000, eHp: 1000, 
            myH: [...player.deck].sort(() => 0.5-Math.random()).slice(0,5),
            eH: [...f.d].sort(() => 0.5-Math.random()).slice(0,5)
        };
        document.getElementById('enemyName').innerText = f.n;
        tab('battlePage');
        renderBattle();
    }

    function renderBattle() {
        const myDiv = document.getElementById('myHand');
        myDiv.innerHTML = "";
        bState.myH.forEach((c, i) => {
            myDiv.innerHTML += `<div class="mini-card" style="min-width:70px; aspect-ratio:2.5/3.5;" onclick="attack(${i})"><img src="${c.img}"><br>${c.hp}</div>`;
        });
        const eDiv = document.getElementById('enemyHand');
        eDiv.innerHTML = "";
        bState.eH.forEach(() => { eDiv.innerHTML += `<div style="width:50px; height:70px; background:#3c5aa6; border-radius:5px; border:1px solid white;"></div>`; });
        updateBattleUI();
    }

    function attack(idx) {
        const card = bState.myH[idx];
        const field = document.getElementById('battlefield');
        field.innerHTML = `<div class="mini-card" style="width:80px;"><img src="${card.img}"><b>${card.name}</b></div>`;
        
        bState.eHp -= parseInt(card.hp);
        if(bState.eHp <= 0) { alert("Győztél! +200 🪙"); player.money += 200; sync(); return tab('deckPage'); }

        setTimeout(() => {
            const eCard = bState.eH[Math.floor(Math.random()*bState.eH.length)];
            field.innerHTML += `<div class="mini-card" style="width:80px; border-color:red;"><img src="${eCard.img}"><b>${eCard.name}</b></div>`;
            bState.myHp -= parseInt(eCard.hp);
            updateBattleUI();
            if(bState.myHp <= 0) { alert("Vesztettél!"); tab('deckPage'); }
        }, 800);
    }

    function updateBattleUI() {
        document.getElementById('myHpFill').style.width = (bState.myHp/10) + "%";
        document.getElementById('myHpText').innerText = bState.myHp + "/1000";
        document.getElementById('enemyHpFill').style.width = (bState.eHp/10) + "%";
        document.getElementById('enemyHpText').innerText = bState.eHp + "/1000";
    }

    // BARÁTOK
    function inviteFriend() {
        const code = btoa(JSON.stringify({n: player.username, d: player.deck, p: player.pPic}));
        navigator.clipboard.writeText(code); alert("Kód másolva!");
    }

    function addFriend() {
        let c = prompt("Barát kódja:");
        if(c) { try { player.friends.push(JSON.parse(atob(c))); sync(); renderFriends(); } catch(e){ alert("Hiba!"); }}
    }

    function renderFriends() {
        const l = document.getElementById('friendsList');
        l.innerHTML = "";
        player.friends.forEach((f, i) => {
            l.innerHTML += `<div style="background:#222; padding:10px; margin:5px; border-radius:10px; display:flex; justify-content:space-between;">
                <b>${f.n}</b> <button class="btn btn-red" style="width:auto; margin:0;" onclick="startBattle(${i})">⚔️ HARC</button>
            </div>`;
        });
    }

    // SEGÉD FUNKCIÓK
    function askData(id, t, d) { let a = prompt(t); if(a){ document.getElementById(id).value = a; document.getElementById(d).innerText = a; }}
    function loadImg(i) { const r = new FileReader(); r.onload=(e)=>{ tempPic=e.target.result; document.getElementById('dispImg').src=tempPic; document.getElementById('dispImg').style.display='block'; document.getElementById('imgPlc').style.display='none'; }; r.readAsDataURL(i.files[0]); }
    function loadProf(i) { const r = new FileReader(); r.onload=(e)=>{ player.pPic=e.target.result; sync(); updateUI(); }; r.readAsDataURL(i.files[0]); }
    
    function save() {
        if(!tempPic || !document.getElementById('inName').value) return alert("Név és kép kell!");
        if(player.money < 50) return alert("Nincs elég pénzed!");
        player.money -= 50;
        player.deck.push({ name: document.getElementById('inName').value, hp: document.getElementById('inHP').value || 0, adv: document.getElementById('inAdv').value || "", img: tempPic });
        sync(); renderDeck(); tab('deckPage');
    }

    function renderDeck() {
        const l = document.getElementById('deckList');
        l.innerHTML = "";
        player.deck.forEach((c, i) => {
            l.innerHTML += `<div class="mini-card" onclick="openCard(${i})"><img src="${c.img}"><b>${c.name}</b><small>HP: ${c.hp}</small></div>`;
        });
        updateUI();
    }
</script>
</body>
</html>
