<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ipari 1v1 - Javított Verzió</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; margin: 0; padding-bottom: 100px; }
        .hidden { display: none !important; }
        .page { padding: 15px; text-align: center; min-height: 100vh; }
        
        /* 4 OSZLOPOS RÁCS */
        .grid-4 { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 6px; 
            padding: 5px;
        }
        
        .mini-card { 
            background: linear-gradient(145deg, #ffd700, #ff8c00); 
            border-radius: 6px; aspect-ratio: 2/3; position: relative; 
            overflow: hidden; border: 1px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.5);
        }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; }
        .mini-card .hp { position: absolute; top: 1px; right: 1px; background: white; color: red; font-size: 7px; font-weight: bold; padding: 1px 2px; border-radius: 3px; }
        .mini-card .name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; font-size: 7px; padding: 2px 0; }

        /* BARÁT LISTA */
        .friend-card { 
            background: #1a1a1a; display: flex; align-items: center; 
            padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer;
        }
        .friend-card img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ffcb05; margin-right: 15px; object-fit: cover; }
        .friend-card .f-info { text-align: left; flex-grow: 1; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .back-btn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }

        /* NAVBAR */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 2px solid #222; z-index: 1000; }
        .nav-item { color: #666; background: none; border: none; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #ffcb05; font-weight: bold; }

        .btn { background: #ffcb05; color: #3c5aa6; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .input-box { width: 85%; padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; }
    </style>
</head>
<body>

    <div id="cardModal" class="modal hidden">
        <button class="back-btn" onclick="closeM('cardModal')">⬅ VISSZA</button>
        <div id="modalData"></div>
    </div>

    <div id="friendDetailModal" class="modal hidden">
        <button class="back-btn" onclick="closeM('friendDetailModal')">⬅ VISSZA A BARÁTOKHOZ</button>
        <div id="friendDetailData"></div>
    </div>

    <div id="loginPage" class="page">
        <h1 style="color:#ffcb05;">IPARI 1v1</h1>
        <input type="text" id="uName" class="input-box" placeholder="Felhasználónév">
        <input type="password" id="uPass" class="input-box" placeholder="Jelszó">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <div id="deckPage" class="page hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>🎒 Saját Pakli</h2>
            <div style="color:#ffcb05; font-weight:bold;"><span id="coinCount">0</span> 🪙</div>
        </div>
        <div id="deckList" class="grid-4"></div>
    </div>

    <div id="friendsPage" class="page hidden">
        <h2>👥 Barátok</h2>
        <div id="friendsList"></div>
        <button class="btn" style="background:#3498db; color:white;" onclick="copyMyCode()">SAJÁT KÓDOM MÁSOLÁSA</button>
        <button class="btn" onclick="addNewFriend()">BARÁT HOZZÁADÁSA (KÓD)</button>
    </div>

    <div id="shopPage" class="page hidden">
        <h2>🛒 Bolt</h2>
        <div style="background:#1a1a1a; padding:15px; border-radius:15px; border: 2px dashed #ffcb05;">
            <h3 id="streakDay">1. Nap</h3>
            <button id="claimBtn" class="btn" onclick="claimDaily()">NAPI JUTALOM ÁTVÉTELE</button>
        </div>
    </div>

    <div id="editorPage" class="page hidden">
        <h2>🎨 Kártya Készítő</h2>
        <div style="background:#1a1a1a; padding:15px; border-radius:15px;">
            <input type="text" id="eName" class="input-box" placeholder="Név">
            <input type="number" id="eHp" class="input-box" placeholder="HP">
            <textarea id="eAdv" class="input-box" placeholder="Leírás"></textarea>
            <button class="btn" style="background:#444; color:white;" onclick="document.getElementById('fileIn').click()">KÉP FELTÖLTÉSE</button>
            <input type="file" id="fileIn" class="hidden" onchange="previewImg(this)">
            <div id="previewContainer" style="margin-top:15px; display:none;">
                <p style="font-size:10px;">ELŐNÉZET:</p>
                <img id="ePrev" style="width:120px; border-radius:10px; border:2px solid #ffcb05;">
            </div>
            <button class="btn" onclick="saveCard()">MENTÉS (50 🪙)</button>
        </div>
    </div>

    <div id="profilePage" class="page hidden">
        <img id="pPic" style="width:100px; height:100px; border-radius:50%; border:3px solid #ffcb05; object-fit:cover;" src="https://via.placeholder.com/100">
        <h2 id="pNameDisp">Név</h2>
        <button class="btn" style="width:auto; padding:5px 15px; font-size:12px;" onclick="document.getElementById('pIn').click()">Kép módosítása</button>
        <input type="file" id="pIn" class="hidden" onchange="updatePP(this)">
        <button class="btn" style="background:#ff4444; color:white; margin-top:50px;" onclick="location.reload()">KIJELENTKEZÉS</button>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item active" onclick="tab('deckPage', this)"><span>🎒</span>Pakli</button>
        <button class="nav-item" onclick="tab('friendsPage', this)"><span>👥</span>Barátok</button>
        <button class="nav-item" onclick="tab('shopPage', this)"><span>🛒</span>Bolt</button>
        <button class="nav-item" onclick="tab('editorPage', this)"><span>🎨</span>Készítő</button>
        <button class="nav-item" onclick="tab('profilePage', this)"><span>👤</span>Profil</button>
    </nav>

<script>
    let player = null;
    let tempImg = "";

    function auth() {
        const u = document.getElementById('uName').value.trim().toLowerCase();
        const p = document.getElementById('uPass').value;
        if(!u || !p) return;
        let data = JSON.parse(localStorage.getItem('ipari_v5_' + u));
        player = data || { username: u, password: p, money: 500, deck: [], friends: [], streak: 0, lastClaim: 0, pPic: "" };
        if(data && data.password !== p) return alert("Rossz jelszó!");
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        tab('deckPage', document.querySelectorAll('.nav-item')[0]);
        updateUI();
    }

    function sync() { localStorage.setItem('ipari_v5_' + player.username.toLowerCase(), JSON.stringify(player)); }

    function updateUI() {
        document.getElementById('coinCount').innerText = player.money;
        document.getElementById('pNameDisp').innerText = player.username;
        if(player.pPic) document.getElementById('pPic').src = player.pPic;
        document.getElementById('streakDay').innerText = `${player.streak + 1}. Nap (Jutalom: ${(player.streak % 7 + 1) * 100} 🪙)`;
    }

    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(btn) btn.classList.add('active');
        if(id === 'deckPage') renderGrid('deckList', player.deck, true);
        if(id === 'friendsPage') renderFriendsList();
    }

    function renderGrid(contId, cards, isOwn) {
        const cont = document.getElementById(contId);
        cont.innerHTML = cards.length ? "" : "<p style='grid-column:span 4'>Üres...</p>";
        cards.forEach((c, i) => {
            cont.innerHTML += `
                <div class="mini-card" onclick="${isOwn ? `openCard(${i})` : ''}">
                    <div class="hp">${c.hp}</div>
                    <img src="${c.img}">
                    <div class="name">${c.name}</div>
                </div>`;
        });
    }

    // KÉSZÍTŐ ELŐNÉZET FIX
    function previewImg(i) {
        const r = new FileReader();
        r.onload = (e) => { 
            tempImg = e.target.result; 
            document.getElementById('ePrev').src = tempImg; 
            document.getElementById('previewContainer').style.display = 'block';
        };
        r.readAsDataURL(i.files[0]);
    }

    function saveCard() {
        const n = document.getElementById('eName').value;
        const h = document.getElementById('eHp').value;
        if(!n || !h || !tempImg) return alert("Minden adat kell!");
        if(player.money < 50) return alert("Nincs elég pénzed!");
        player.money -= 50;
        player.deck.push({ name: n, hp: h, adv: document.getElementById('eAdv').value, img: tempImg });
        sync(); updateUI(); tab('deckPage');
        alert("Sikeres mentés!");
    }

    // BARÁTOK
    function renderFriendsList() {
        const list = document.getElementById('friendsList');
        list.innerHTML = player.friends.length ? "" : "<p>Nincsenek barátok.</p>";
        player.friends.forEach((f, i) => {
            list.innerHTML += `
                <div class="friend-card" onclick="openFriend(${i})">
                    <img src="${f.p || 'https://via.placeholder.com/100'}">
                    <div class="f-info">
                        <div style="font-weight:bold; font-size:18px;">${f.n}</div>
                        <div style="font-size:12px; color:#888;">${f.d.length} kártya</div>
                    </div>
                    <div style="color:#ffcb05">MEGTEKINTÉS</div>
                </div>`;
        });
    }

    function openFriend(i) {
        const f = player.friends[i];
        document.getElementById('friendDetailModal').classList.remove('hidden');
        document.getElementById('friendDetailData').innerHTML = `
            <img src="${f.p || 'https://via.placeholder.com/100'}" style="width:80px; height:80px; border-radius:50%; border:2px solid #ffcb05;">
            <h2>${f.n} gyűjteménye</h2>
            <div id="fDeckGrid" class="grid-4"></div>
        `;
        renderGrid('fDeckGrid', f.d, false);
    }

    function copyMyCode() {
        const code = btoa(JSON.stringify({n: player.username, d: player.deck, p: player.pPic}));
        navigator.clipboard.writeText(code);
        alert("Kód másolva!");
    }

    function addNewFriend() {
        let code = prompt("Barát kódja:");
        if(!code) return;
        try {
            let data = JSON.parse(atob(code));
            player.friends.push(data);
            sync(); renderFriendsList();
        } catch(e) { alert("Hibás kód!"); }
    }

    // EGYÉB
    function openCard(i) {
        const c = player.deck[i];
        document.getElementById('cardModal').classList.remove('hidden');
        document.getElementById('modalData').innerHTML = `
            <div style="background:linear-gradient(145deg, #ffd700, #ff8c00); padding:20px; border-radius:20px; color:black;">
                <h2 style="margin:0">${c.name} <span style="float:right; color:red">HP ${c.hp}</span></h2>
                <img src="${c.img}" style="width:100%; border-radius:10px; margin:15px 0; border:2px solid #fff;">
                <p><b>Képesség:</b> ${c.adv || "Nincs"}</p>
                <button class="btn" style="background:red; color:white;" onclick="sellCard(${i})">ELADÁS (75 🪙)</button>
            </div>
        `;
    }

    function sellCard(i) {
        player.money += 75; player.deck.splice(i, 1);
        sync(); closeM('cardModal'); renderGrid('deckList', player.deck, true); updateUI();
    }

    function claimDaily() {
        const now = Date.now();
        if(now - player.lastClaim < 86400000) return alert("Ma már kérted!");
        const amt = (player.streak % 7 + 1) * 100;
        player.money += amt; player.streak++; player.lastClaim = now;
        sync(); updateUI(); alert(`Kaptál ${amt} érmét!`);
    }

    function updatePP(i) {
        const r = new FileReader();
        r.onload = (e) => { player.pPic = e.target.result; sync(); updateUI(); };
        r.readAsDataURL(i.files[0]);
    }

    function closeM(id) { document.getElementById(id).classList.add('hidden'); }
</script>
</body>
</html>
