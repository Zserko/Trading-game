<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon TCG Mobile</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 80px; }
        .hidden { display: none !important; }
        .page { padding: 15px; text-align: center; min-height: 100vh; }
        
        /* 4 OSZLOPOS PAKLI RÁCS */
        .deck-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 600px) { .deck-grid { grid-template-columns: repeat(4, 1fr); } }

        .mini-card { background: #f6d365; border: 4px solid #ffde00; border-radius: 10px; color: black; padding: 5px; font-size: 10px; position: relative; text-align: left; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .mini-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
        .del-btn { background: #ff4444; color: white; border: none; font-size: 10px; padding: 5px; border-radius: 5px; margin-top: 5px; width: 100%; font-weight: bold; }
        .buy-btn { background: #2ecc71; color: white; border: none; font-size: 10px; padding: 5px; border-radius: 5px; margin-top: 5px; width: 100%; font-weight: bold; }

        /* UI ELEMEK */
        .ui-box { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        input, textarea { width: 90%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; background: #2a2a2a; color: white; font-size: 16px; }
        .btn { background: #ffcb05; color: #3c5aa6; border: 2px solid #3c5aa6; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; }

        /* ALSÓ NAVBAR */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #333; z-index: 1000; }
        .nav-item { color: #888; font-size: 12px; background: none; border: none; text-align: center; cursor: pointer; }
        .nav-item.active { color: #ffcb05; font-weight: bold; }
    </style>
</head>
<body>

    <!-- LOGIN OLDAL -->
    <div id="loginPage" class="page">
        <h1 style="color:#ffcb05; margin-top: 50px;">POKÉMON LOGIN</h1>
        <input type="text" id="uName" placeholder="Felhasználónév">
        <input type="password" id="uPass" placeholder="Jelszó">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <!-- SZERKESZTŐ -->
    <div id="editorPage" class="page hidden">
        <div class="ui-box">
            <h3>🎨 Kártya Szerkesztő</h3>
            <input type="text" id="inName" placeholder="Pokémon neve">
            <input type="number" id="inHP" placeholder="HP">
            <input type="text" id="inAdv" placeholder="Előny...">
            <input type="file" id="fileIn" accept="image/*" onchange="loadImg(this)">
            <button class="btn" style="margin-top:15px;" onclick="save()">MENTÉS (50 🪙)</button>
        </div>
    </div>

    <!-- PAKLI -->
    <div id="deckPage" class="page hidden">
        <h3>🎒 PAKLID (<span class="coins">0</span> 🪙)</h3>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <!-- SHOP -->
    <div id="shopPage" class="page hidden">
        <h3>🛒 SHOP</h3>
        <div class="ui-box">
            <h4>📅 Napi Ajándék</h4>
            <button id="dailyBtn" class="btn" onclick="claimDaily()">200 🪙 ÁTVÉTELE</button>
        </div>
        <div class="ui-box">
            <h4>✨ Napi Kártyák</h4>
            <div id="shopList" class="deck-grid"></div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar hidden" id="menu">
        <button class="nav-item active" onclick="tab('editorPage', this)">🎨<br>Szerkesztő</button>
        <button class="nav-item" onclick="tab('deckPage', this)">🎒<br>Pakli</button>
        <button class="nav-item" onclick="tab('shopPage', this)">🛒<br>Shop</button>
    </nav>

<script>
    let player = null;
    let tempPic = "";
    
    // Előre beállított bolti kártyák
    const shopItems = [
        { name: "Pikachu", hp: 60, img: "https://assets.pokemon.com", price: 200 },
        { name: "Charizard", hp: 120, img: "https://assets.pokemon.com", price: 500 },
        { name: "Mewtwo", hp: 150, img: "https://assets.pokemon.com", price: 800 }
    ];

    function tab(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(b) b.classList.add('active');
        if(id === 'deckPage') renderDeck();
        if(id === 'shopPage') renderShop();
    }

    function loadImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { tempPic = e.target.result; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function auth() {
        const u = document.getElementById('uName').value.trim();
        const p = document.getElementById('uPass').value;
        if(!u || !p) return;
        
        let data = JSON.parse(localStorage.getItem('pk_vFinal_v2_' + u));
        player = data || { username: u, password: p, money: 500, deck: [], lastDaily: "" };
        
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        tab('editorPage', document.querySelector('.nav-item'));
        updateCoins();
    }

    function save() {
        const nameVal = document.getElementById('inName').value;
        const hpVal = document.getElementById('inHP').value;
        
        // JAVÍTOTT ELLENŐRZÉS
        if(!nameVal) return alert("Adj meg nevet!");
        if(!tempPic) return alert("Válassz ki egy fotót!");
        if(player.money < 50) return alert("Nincs elég pénzed!");

        player.money -= 50;
        player.deck.push({ 
            name: nameVal, 
            hp: hpVal || 0, 
            img: tempPic 
        });
        
        // Ürítés az új kártyához
        document.getElementById('inName').value = "";
        document.getElementById('inHP').value = "";
        tempPic = "";
        
        sync(); 
        updateCoins(); 
        alert("Sikeres mentés a Paklidba!");
    }

    function renderDeck() {
        const list = document.getElementById('deckList');
        list.innerHTML = "";
        player.deck.forEach((c, i) => {
            list.innerHTML += `
                <div class="mini-card">
                    <img src="${c.img}">
                    <b>${c.name}</b><br>HP: ${c.hp}
                    <button class="del-btn" onclick="removeCard(${i})">Törlés (+25🪙)</button>
                </div>`;
        });
    }

    function removeCard(i) {
        player.deck.splice(i, 1);
        player.money += 25;
        sync(); renderDeck(); updateCoins();
    }

    function claimDaily() {
        const today = new Date().toDateString();
        if(player.lastDaily === today) return alert("Ma már átvetted a bónuszt!");
        player.money += 200;
        player.lastDaily = today;
        sync(); updateCoins(); alert("Kaptál 200 érmét a balance-odra!");
    }

    function renderShop() {
        const list = document.getElementById('shopList');
        list.innerHTML = "";
        shopItems.forEach(item => {
            list.innerHTML += `
                <div class="mini-card">
                    <img src="${item.img}">
                    <b>${item.name}</b><br>${item.price} 🪙
                    <button class="buy-btn" onclick="buyItem('${item.name}', ${item.hp}, '${item.img}', ${item.price})">MEGVESZ</button>
                </div>`;
        });
    }

    function buyItem(name, hp, img, price) {
        if(player.money < price) return alert("Nincs elég pénzed!");
        player.money -= price;
        player.deck.push({ name, hp, img });
        sync(); updateCoins(); alert("Megvetted az új kártyát!");
    }

    function updateCoins() { 
        document.querySelectorAll('.coins').forEach(e => e.innerText = player.money); 
    }
    
    function sync() { 
        localStorage.setItem('pk_vFinal_v2_' + player.username, JSON.stringify(player)); 
    }
</script>
</body>
</html>
