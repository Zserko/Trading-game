<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ipari 1v1</title>
    <style>
        :root { --common: #888; --uncommon: #2ecc71; --rare: #3498db; --epic: #9b59b6; --legendary: #f1c40f; }
        body { font-family: sans-serif; background: #0a0a0a; color: white; margin: 0; padding-top: 60px; padding-bottom: 100px; }
        .hidden { display: none !important; }
        
        /* Felső sáv */
        .top-bar { position: fixed; top: 0; width: 100%; background: #ffcb05; color: #111; padding: 15px; text-align: center; font-weight: bold; z-index: 100; box-sizing: border-box; }
        
        .page { padding: 20px; text-align: center; }
        
        /* Készítő kártya box */
        .preview-card { 
            background: #1a1a1a; border: 4px solid var(--common); border-radius: 15px; 
            width: 260px; aspect-ratio: 2.5/3.8; margin: 0 auto 20px; padding: 10px; 
            text-align: left; position: relative; overflow: hidden;
        }
        .img-box { width: 100%; height: 160px; background: #000; position: relative; overflow: hidden; border-radius: 8px; cursor: move; touch-action: none; }
        .img-box img { position: absolute; width: 100%; }

        /* Alsó menü */
        .navbar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 2px solid #333; }
        .nav-item { flex: 1; padding: 15px; color: #777; border: none; background: none; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #ffcb05; }

        input, select { width: 90%; padding: 12px; margin: 8px 0; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 8px; }
        .btn { background: #ffcb05; color: #111; border: none; padding: 15px; width: 90%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="topBar" class="top-bar hidden">Pénz: <span id="moneySpan">500</span> 🪙</div>

<!-- BELÉPÉS -->
<div id="loginPage" class="page">
    <h1 style="color:#ffcb05">Ipari 1v1</h1>
    <input type="text" id="uName" placeholder="Felhasználónév">
    <input type="password" id="uPass" placeholder="Jelszó">
    <button class="btn" onclick="auth()">BELÉPÉS</button>
</div>

<!-- KÉSZÍTŐ (EDITOR) -->
<div id="editorPage" class="page hidden">
    <div class="preview-card" id="cardStyle">
        <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold;">
            <span id="pRare">COMMON</span>
            <span id="pHP" style="color:#ff4444">HP 0</span>
        </div>
        <div id="pName" style="font-size:18px; font-weight:bold; margin: 5px 0;">Név...</div>
        <div class="img-box" id="dragArea">
            <img id="pImg" style="display:none;">
            <div id="noImg" style="text-align:center; padding-top:60px; color:#444;">Válassz képet!</div>
        </div>
        <div id="pDesc" style="font-size:12px; color:#aaa; margin-top:10px;">Leírás...</div>
    </div>

    <button class="btn" style="background:#444; color:white;" onclick="document.getElementById('fileIn').click()">KÉP FELTÖLTÉSE</button>
    <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="loadFile(this)">
    
    <input type="text" id="iName" placeholder="Kártya neve" oninput="live()">
    <input type="number" id="iHP" placeholder="HP" oninput="live()">
    <input type="text" id="iDesc" placeholder="Képesség" oninput="live()">
    <select id="iRare" onchange="live()">
        <option value="Common">Common</option>
        <option value="Uncommon">Uncommon</option>
        <option value="Rare">Rare</option>
        <option value="Epic">Epic</option>
        <option value="Legendary">Legendary</option>
    </select>
    <button class="btn" onclick="save()">MENTÉS (50 🪙)</button>
</div>

<!-- PAKLI -->
<div id="deckPage" class="page hidden">
    <h2>Saját kártyáid</h2>
    <div id="deckList"></div>
</div>

<!-- MENÜ -->
<nav id="menu" class="navbar hidden">
    <button class="nav-item" onclick="tab('deckPage')">🎒 Pakli</button>
    <button class="nav-item active" onclick="tab('editorPage')">🎨 Készítő</button>
    <button class="nav-item" onclick="location.reload()">👤 Kilépés</button>
</nav>

<script>
    let player = null;
    let posX = 0, posY = 0, startX = 0, startY = 0, dragging = false;

    // BELÉPÉS FUNKCIÓ
    function auth() {
        const u = document.getElementById('uName').value.trim();
        const p = document.getElementById('uPass').value;
        if(!u || !p) return alert("Írj be mindent!");

        // Egyszerűsített mentés
        player = { name: u, money: 500, deck: [] };
        
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('topBar').classList.remove('hidden');
        tab('editorPage');
    }

    // FÜL VÁLTÁS
    function tab(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    }

    // ÉLŐ SZINKRONIZÁLÁS (Ami beírsz, azonnal látszik)
    function live() {
        document.getElementById('pName').innerText = document.getElementById('iName').value || "Név...";
        document.getElementById('pHP').innerText = "HP " + (document.getElementById('iHP').value || "0");
        document.getElementById('pDesc').innerText = document.getElementById('iDesc').value || "Leírás...";
        
        const rare = document.getElementById('iRare').value;
        document.getElementById('pRare').innerText = rare.toUpperCase();
        document.getElementById('cardStyle').style.borderColor = `var(--${rare.toLowerCase()})`;
    }

    // KÉP BETÖLTÉSE
    function loadFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('pImg');
                img.src = e.target.result;
                img.style.display = "block";
                document.getElementById('noImg').style.display = "none";
                posX = 0; posY = 0; img.style.top = "0px"; img.style.left = "0px";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // KÉP MOZGATÁSA
    const area = document.getElementById('dragArea');
    area.onmousedown = area.ontouchstart = (e) => {
        dragging = true;
        const ev = e.touches ? e.touches[0] : e;
        startX = ev.clientX - posX;
        startY = ev.clientY - posY;
    };
    window.onmousemove = window.ontouchmove = (e) => {
        if(!dragging) return;
        const ev = e.touches ? e.touches[0] : e;
        posX = ev.clientX - startX;
        posY = ev.clientY - startY;
        document.getElementById('pImg').style.left = posX + "px";
        document.getElementById('pImg').style.top = posY + "px";
    };
    window.onmouseup = window.ontouchend = () => dragging = false;

    // MENTÉS
    function save() {
        if(player.money < 50) return alert("Nincs elég pénzed!");
        if(!document.getElementById('iName').value) return alert("Adj nevet a kártyának!");
        
        player.money -= 50;
        document.getElementById('moneySpan').innerText = player.money;
        alert("Kártya elmentve a paklidba!");
        tab('deckPage');
    }
</script>

</body>
</html>
