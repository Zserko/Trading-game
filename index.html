<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ipari 1v1 - Ultimate</title>
    <style>
        :root {
            --common: #888; --uncommon: #2ecc71; --rare: #3498db; 
            --epic: #9b59b6; --legendary: #f1c40f; --mythic: #e74c3c; --exotic: #00ffee;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; margin: 0; padding-bottom: 150px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .page { padding: 20px; text-align: center; min-height: 100vh; }
        
        .deck-grid { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .big-card { 
            background: #1a1a1a; border: 5px solid var(--common); border-radius: 25px; 
            color: white; padding: 15px; width: 300px; position: relative; text-align: left; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); overflow: hidden;
        }
        .locked { filter: grayscale(1) brightness(0.4); }
        .img-container { width: 100%; height: 210px; border-radius: 15px; background: #111; border: 1px solid #333; overflow: hidden; position: relative; }
        .img-container img { position: absolute; }
        .rarity-label { font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .hp-badge { float: right; color: #ff4444; font-weight: bold; font-size: 20px; }
        .card-desc { margin-top: 10px; font-size: 14px; color: #bbb; min-height: 20px; }

        .navbar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #111; 
            display: flex; justify-content: space-around; padding: 25px 0; 
            border-top: 4px solid #222; z-index: 1000;
        }
        .nav-item { color: #888; background: none; border: none; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: #ffcb05; transform: scale(1.1); }

        .input-box { width: 85%; padding: 15px; border-radius: 12px; border: 2px solid #333; background: #1a1a1a; color: white; margin-bottom: 10px; text-align: center; font-size: 16px; }
        .btn { background: #ffcb05; color: #3c5aa6; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 90%; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .shop-box { background: #1a1a1a; border: 2px solid #333; padding: 20px; border-radius: 20px; margin-bottom: 20px; width: 90%; margin-inline: auto; }
        
        #pfp-circle { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ffcb05; margin: 20px auto; overflow: hidden; background: #222; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        #pfp-circle img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="loginPage" class="page">
        <div style="color: #ffcb05; font-size: 40px; font-weight: 800; margin: 50px 0;">Ipari 1v1</div>
        <input type="text" id="uName" class="input-box" placeholder="Felhasználónév">
        <input type="password" id="uPass" class="input-box" placeholder="Jelszó">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <div id="deckPage" class="page hidden">
        <h2 style="color:#ffcb05">🎒 Paklid (<span id="c1">0</span> 🪙)</h2>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <div id="albumPage" class="page hidden">
        <h2 style="color:#ffcb05">📖 Album</h2>
        <div id="albumList" class="deck-grid"></div>
    </div>

    <div id="shopPage" class="page hidden">
        <h2 style="color:#ffcb05">🛒 Bolt (<span id="c2">0</span> 🪙)</h2>
        <div class="shop-box">
            <h3>🎁 Napi 200</h3>
            <button class="btn" id="dailyBtn" onclick="claimDaily()">Beszedés</button>
        </div>
        <div class="shop-box">
            <h3>📈 Sorozat</h3>
            <p id="stext">Következő: 100 🪙</p>
            <button class="btn" id="streakBtn" onclick="claimStreak()">Beszedés</button>
        </div>
        <div class="shop-box">
            <h3>📦 Pack</h3>
            <button class="btn" style="background:#3498db; color:white;" onclick="openPack()">Nyitás (150 🪙)</button>
        </div>
    </div>

    <div id="editorPage" class="page hidden">
        <h2 style="color:#ffcb05">🎨 Készítő</h2>
        <div class="big-card" id="preview" style="margin: 0 auto;">
            <div class="rarity-label" id="pRare">Common</div>
            <div class="hp-badge" id="pHPText">HP 0</div>
            <div id="pNameText" style="font-weight:bold; font-size: 20px; margin-bottom:10px;">Név...</div>
            <div class="img-container" id="cropBox" style="cursor: move; touch-action: none;">
                <img id="eImg" style="display:none; top:0; left:0;">
                <span id="plus" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#555;">➕ KÉP</span>
            </div>
            <div class="card-desc" id="pDescText">Leírás...</div>
        </div>
        <input type="file" id="fileIn" class="hidden" onchange="loadImg(this, 'card')">
        <div style="margin-top:15px; width:90%; margin-inline:auto;">
            <label style="font-size:12px; color:#888;">Nagyítás:</label>
            <input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1" style="width:100%" oninput="apply()">
            <input type="text" id="iName" class="input-box" placeholder="Név" oninput="sync()">
            <input type="number" id="iHP" class="input-box" placeholder="HP" oninput="sync()">
            <input type="text" id="iDesc" class="input-box" placeholder="Leírás" oninput="sync()">
            <select id="iRare" class="input-box" onchange="sync()">
                <option value="Common">Common</option><option value="Uncommon">Uncommon</option>
                <option value="Rare">Rare</option><option value="Epic">Epic</option><option value="Legendary">Legendary</option>
            </select>
            <button class="btn" onclick="saveCard()">LÉTREHOZÁS (50 🪙)</button>
        </div>
    </div>

    <div id="profilePage" class="page hidden">
        <h2 style="color:#ffcb05">👤 Profil</h2>
        <div id="pfp-circle" onclick="document.getElementById('pfpIn').click()">
            <img id="pfpImg" src="" class="hidden">
            <span id="pfpPlus">➕</span>
        </div>
        <input type="file" id="pfpIn" class="hidden" onchange="loadImg(this, 'pfp')">
        <div id="pNameDisp" style="font-size:28px; font-weight:bold; margin-bottom:20px;"></div>
        <button class="btn" style="background:#ff4444; color:white;" onclick="location.reload()">KIJELENTKEZÉS</button>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item active" onclick="tab('deckPage', this)">🎒 Pakli</button>
        <button class="nav-item" onclick="tab('albumPage', this)">📖 Album</button>
        <button class="nav-item" onclick="tab('shopPage', this)">🛒 Bolt</button>
        <button class="nav-item" onclick="tab('editorPage', this)">🎨 Készítő</button>
        <button class="nav-item" onclick="tab('profilePage', this)">👤 Profil</button>
    </nav>

<script>
    let player = null, tempImg = "", imgX = 0, imgY = 0, isDragging = false, startX, startY;
    const G_KEY = "global_cards_v8";

    function getG() { return JSON.parse(localStorage.getItem(G_KEY)) || []; }

    function auth() {
        const u = document.getElementById('uName').value.trim().toLowerCase();
        const p = document.getElementById('uPass').value;
        if(!u || !p) return;
        let d = JSON.parse(localStorage.getItem('u_' + u));
        player = d && d.password === p ? d : { username: u, password: p, money: 500, deck: [], pfp: "", ld: 0, ls: 0, sD: 0 };
        if(d && d.password !== p) return alert("Hibás jelszó!");
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        if(player.pfp) { document.getElementById('pfpImg').src = player.pfp; document.getElementById('pfpImg').classList.remove('hidden'); document.getElementById('pfpPlus').classList.add('hidden'); }
        tab('deckPage');
    }

    const cropBox = document.getElementById('cropBox'), eImg = document.getElementById('eImg');
    cropBox.onpointerdown = (e) => { if(eImg.style.display==='none') return document.getElementById('fileIn').click(); isDragging = true; startX = e.clientX - imgX; startY = e.clientY - imgY; cropBox.setPointerCapture(e.pointerId); };
    cropBox.onpointermove = (e) => { if(isDragging) { imgX = e.clientX - startX; imgY = e.clientY - startY; apply(); } };
    cropBox.onpointerup = () => isDragging = false;
    function apply() { eImg.style.transform = `translate(${imgX}px, ${imgY}px) scale(${document.getElementById('zoom').value})`; }

    function loadImg(input, type) {
        const r = new FileReader();
        r.onload = (e) => {
            if(type==='card') { tempImg = e.target.result; eImg.src = tempImg; eImg.style.display="block"; document.getElementById('plus').style.display="none"; imgX=0; imgY=0; apply(); }
            else { player.pfp = e.target.result; document.getElementById('pfpImg').src=player.pfp; document.getElementById('pfpImg').classList.remove('hidden'); document.getElementById('pfpPlus').classList.add('hidden'); save(); }
        };
        r.readAsDataURL(input.files);
    }

    function sync() {
        document.getElementById('pNameText').innerText = document.getElementById('iName').value || "Név...";
        document.getElementById('pHPText').innerText = "HP " + (document.getElementById('iHP').value || "0");
        document.getElementById('pDescText').innerText = document.getElementById('iDesc').value || "Leírás...";
        let r = document.getElementById('iRare').value;
        document.getElementById('preview').style.borderColor = `var(--${r.toLowerCase()})`;
        document.getElementById('pRare').innerText = r;
    }

    function saveCard() {
        if(player.money < 50 || !tempImg) return alert("Hiba!");
        const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
        canvas.width = 300; canvas.height = 210;
        ctx.translate(imgX, imgY); ctx.scale(document.getElementById('zoom').value, document.getElementById('zoom').value);
        ctx.drawImage(eImg, 0, 0);
        const card = { id: Date.now(), name: document.getElementById('iName').value, hp: document.getElementById('iHP').value, desc: document.getElementById('iDesc').value, rare: document.getElementById('iRare').value, img: canvas.toDataURL('image/jpeg', 0.7) };
        let g = getG(); g.push(card); localStorage.setItem(G_KEY, JSON.stringify(g));
        player.deck.push(card.id); player.money -= 50; save(); tab('deckPage');
    }

    function openPack() {
        let g = getG(); if(!g.length || player.money < 150) return alert("Hiba!");
        let c = g[Math.floor(Math.random()*g.length)];
        player.money -= 150; if(!player.deck.includes(c.id)) player.deck.push(c.id);
        save(); alert("Nyitva: " + c.name);
    }

    function claimDaily() {
        if(Date.now() - player.ld < 86400000) return alert("Holnap!");
        player.money += 200; player.ld = Date.now(); save();
    }

    function claimStreak() {
        let n = Date.now(); if(n - player.ls < 86400000) return alert("Holnap!");
        if(n - player.ls > 172800000) player.sD = 0;
        player.sD = (player.sD % 7) + 1; player.money += (player.sD * 100); player.ls = n; save();
    }

    function save() { localStorage.setItem('u_' + player.username, JSON.stringify(player)); update(); }

    function update() {
        document.getElementById('c1').innerText = player.money; document.getElementById('c2').innerText = player.money;
        document.getElementById('pNameDisp').innerText = player.username;
        document.getElementById('stext').innerText = (player.sD % 7 + 1) + ". nap: " + ((player.sD % 7 + 1) * 100) + " 🪙";
        const g = getG();
        const draw = (el, own) => {
            document.getElementById(el).innerHTML = "";
            g.forEach(c => {
                let has = player.deck.includes(c.id); if(own && !has) return;
                let d = document.createElement('div'); d.className = `big-card ${!has?'locked':''}`;
                d.style.borderColor = `var(--${c.rare.toLowerCase()})`;
                d.innerHTML = `<div class="rarity-label">${c.rare}</div><div class="hp-badge">HP ${c.hp}</div><div style="font-weight:bold;font-size:20px;">${c.name}</div><div class="img-container"><img src="${c.img}" style="width:100%"></div><div class="card-desc">${c.desc}</div>`;
                document.getElementById(el).appendChild(d);
            });
        };
        draw('deckList', true); draw('albumList', false);
    }

    function tab(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(b) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); b.classList.add('active'); }
        update();
    }
</script>
</body>
</html>
