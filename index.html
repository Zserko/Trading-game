<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Ipari Card Game</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

.hidden{display:none}

.page{
padding:20px;
min-height:100vh;
}

header{
background:#111;
padding:15px;
font-size:22px;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#ffcb05;
cursor:pointer;
margin:5px;
font-weight:bold;
}

.big-card{
background:linear-gradient(145deg,#ffd700,#ff8c00);
border:4px solid white;
border-radius:20px;
padding:10px;
margin:20px auto;
width:80%;
max-width:300px;
color:black;
text-align:left;
}

.big-card img{
width:100%;
border-radius:10px;
height:180px;
object-fit:cover;
background:white;
}

.album{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.album-card{
background:#1a1a1a;
border-radius:10px;
padding:5px;
}

.album-card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:6px;
}

.navbar{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.navbar button{
background:none;
color:white;
}

</style>
</head>

<body>

<header>Ipari Card Game</header>

<!-- LOGIN -->

<div id="loginPage" class="page">

<h2>Bejelentkezés</h2>

<input id="username" placeholder="felhasználónév">
<br>

<input id="password" type="password" placeholder="jelszó">
<br>

<button onclick="login()">Belépés</button>

</div>

<!-- DECK -->

<div id="deckPage" class="page hidden">

<h2>Pakli</h2>

<div id="deck"></div>

</div>

<!-- ALBUM -->

<div id="albumPage" class="page hidden">

<h2>Album</h2>

<div id="album" class="album"></div>

</div>

<!-- EDITOR -->

<div id="editorPage" class="page hidden">

<h2>Kártya készítés</h2>

<input id="cardName" placeholder="Név">
<br>

<input id="cardHP" placeholder="HP">
<br>

<input id="cardImg" placeholder="Kép URL">
<br>

<input id="cardAdv" placeholder="Leírás">
<br>

<button onclick="createCard()">Mentés</button>

</div>

<!-- FRIENDS -->

<div id="friendsPage" class="page hidden">

<h2>Barátok</h2>

<button onclick="addFriend()">Barát hozzáadás</button>

<div id="friendsList"></div>

</div>

<!-- NAVBAR -->

<div id="menu" class="navbar hidden">

<button onclick="openPage('deckPage')">Pakli</button>

<button onclick="openPage('albumPage')">Album</button>

<button onclick="openPage('editorPage')">Készítő</button>

<button onclick="openPage('friendsPage')">Barátok</button>

</div>

<script>

let player=null

let globalCards=JSON.parse(localStorage.getItem("globalCards")||"[]")

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

let data=JSON.parse(localStorage.getItem("user_"+u))

if(data){

if(data.password!=p){

alert("Hibás jelszó")
return

}

player=data

}else{

player={

username:u,
password:p,
deck:[],
friends:[]

}

localStorage.setItem("user_"+u,JSON.stringify(player))

}

document.getElementById("loginPage").classList.add("hidden")
document.getElementById("menu").classList.remove("hidden")

openPage("deckPage")

renderDeck()
renderAlbum()
renderFriends()

}

function savePlayer(){

localStorage.setItem("user_"+player.username,JSON.stringify(player))
localStorage.setItem("globalCards",JSON.stringify(globalCards))

}

function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

function createCard(){

let name=document.getElementById("cardName").value
let hp=document.getElementById("cardHP").value
let img=document.getElementById("cardImg").value
let adv=document.getElementById("cardAdv").value

let card={

id:Date.now(),
name:name,
hp:hp,
img:img,
adv:adv,
owner:player.username

}

player.deck.push(card)

globalCards.push(card)

savePlayer()

renderDeck()
renderAlbum()

}

function renderDeck(){

let d=document.getElementById("deck")

d.innerHTML=""

player.deck.forEach(c=>{

d.innerHTML+=`

<div class="big-card">

<h3>${c.name}</h3>

<img src="${c.img}">

<p>HP ${c.hp}</p>

<p>${c.adv}</p>

</div>

`

})

}

function renderAlbum(){

let a=document.getElementById("album")

a.innerHTML=""

globalCards.forEach(c=>{

a.innerHTML+=`

<div class="album-card">

<img src="${c.img}">

<div>${c.name}</div>

</div>

`

})

}

function addFriend(){

let name=prompt("Barát neve")

if(!name)return

player.friends.push(name)

savePlayer()

renderFriends()

}

function renderFriends(){

let f=document.getElementById("friendsList")

f.innerHTML=""

player.friends.forEach(fr=>{

f.innerHTML+=`<p>${fr}</p>`

})

}

</script>

</body>
</html>
