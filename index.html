<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ipari Card Game</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
height:100vh;
overflow:hidden;
}

header{
background:#111;
padding:15px;
font-size:22px;
}

.container{
padding:20px;
}

input,select{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#ffcb05;
cursor:pointer;
margin:5px;
font-weight:bold;
}

.album{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.card{
background:#1a1a1a;
border-radius:15px;
padding:10px;
}

.card img{
width:100%;
border-radius:10px;
}

.rarity{
font-size:12px;
opacity:0.7;
}

.hidden{
display:none;
}

.cardView{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.bigCard{
background:#222;
border-radius:20px;
padding:20px;
width:250px;
}

.backButton{
position:fixed;
top:10px;
left:10px;
background:#333;
color:white;
}

</style>

</head>

<body>

<header>Ipari Card Game</header>

<div class="container">

<div id="login">

<h2>Bejelentkezés</h2>

<input id="email" placeholder="email">
<br>
<input id="password" type="password" placeholder="jelszó">

<br>

<button onclick="register()">Regisztráció</button>
<button onclick="login()">Belépés</button>

</div>

<div id="game" class="hidden">

<h3 id="coinText">Coin: 0</h3>

<input id="creatorCode" placeholder="Creator Code">
<button onclick="useCode()">Redeem</button>

<h2>Kártya készítés</h2>

<input id="cardName" placeholder="Kártya neve">
<input id="cardHP" placeholder="HP">
<input id="cardImg" placeholder="Kép URL">

<select id="cardRarity">
<option>Common</option>
<option>Uncommon</option>
<option>Rare</option>
<option>Epic</option>
<option>Legendary</option>
<option>Mythic</option>
<option>Exotic</option>
</select>

<br>

<button onclick="createCard()">Kártya mentése</button>

<h2>Album</h2>

<div id="album" class="album"></div>

</div>

</div>

<div id="cardView" class="hidden cardView">

<button class="backButton" onclick="closeCard()">Vissza</button>

<div id="bigCard" class="bigCard"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "IDE_A_SAJAT_APIKEY",
authDomain: "IDE_A_SAJAT_AUTHDOMAIN",
projectId: "IDE_A_SAJAT_PROJECTID",
storageBucket: "IDE_A_SAJAT_STORAGE",
messagingSenderId: "IDE_A_SAJAT_ID",
appId: "IDE_A_SAJAT_APPID"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let coins=0

window.register = async function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

await createUserWithEmailAndPassword(auth,email,password)

alert("Sikeres regisztráció")

}

window.login = async function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,password)

document.getElementById("login").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

loadCards()

}

window.useCode=function(){

if(localStorage.getItem("codeUsed")){

alert("Már használtad")

return

}

if(document.getElementById("creatorCode").value.toLowerCase()=="zserko"){

coins+=1000

localStorage.setItem("codeUsed",true)

updateCoins()

alert("1000 coin!")

}

}

function updateCoins(){

document.getElementById("coinText").innerText="Coin: "+coins

}

window.createCard = async function(){

const name=document.getElementById("cardName").value
const hp=document.getElementById("cardHP").value
const img=document.getElementById("cardImg").value
const rarity=document.getElementById("cardRarity").value

await addDoc(collection(db,"cards"),{

name:name,
hp:hp,
img:img,
rarity:rarity

})

alert("Kártya mentve")

loadCards()

}

async function loadCards(){

const snapshot=await getDocs(collection(db,"cards"))

const album=document.getElementById("album")

album.innerHTML=""

snapshot.forEach(doc=>{

const c=doc.data()

if(c.name.toLowerCase()=="zoli"){
return
}

album.innerHTML+=`

<div class="card" onclick="openCard('${c.name}','${c.img}','${c.hp}','${c.rarity}')">

<h3>${c.name}</h3>

<img src="${c.img}">

<p>HP ${c.hp}</p>

<p class="rarity">${c.rarity}</p>

</div>

`

})

}

window.openCard=function(name,img,hp,rarity){

document.getElementById("cardView").classList.remove("hidden")

document.getElementById("bigCard").innerHTML=`

<h2>${name}</h2>

<img src="${img}" style="width:100%">

<p>HP ${hp}</p>

<p>${rarity}</p>

`

}

window.closeCard=function(){

document.getElementById("cardView").classList.add("hidden")

}

</script>

</body>
</html>
