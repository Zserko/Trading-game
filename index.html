<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon TCG Battle</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .page { padding: 15px; text-align: center; min-height: 100vh; }
        
        /* CSATA STÍLUS */
        .battle-area { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .hp-bar { width: 100%; background: #444; height: 25px; border-radius: 15px; position: relative; margin: 10px 0; border: 2px solid #ffcb05; }
        .hp-fill { background: #2ecc71; height: 100%; border-radius: 12px; transition: width 0.5s; width: 100%; }
        .hp-text { position: absolute; width: 100%; text-align: center; top: 2px; font-weight: bold; font-size: 14px; text-shadow: 1px 1px black; }
        
        .battle-hand { display: flex; gap: 5px; overflow-x: auto; padding: 10px; width: 100%; border-top: 1px solid #333; }
        .battle-card { width: 80px; flex-shrink: 0; background: #f6d365; color: black; border-radius: 8px; font-size: 9px; padding: 5px; cursor: pointer; border: 2px solid gold; }
        .battle-card img { width: 100%; height: 40px; object-fit: cover; }
        .enemy-card-back { width: 80px; height: 110px; background: #3c5aa6; border: 2px solid white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .battlefield { width: 100%; height: 150px; border: 2px dashed #555; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* ALAP MODAL ÉS GOMBOK */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; text-align: center; border: 2px solid #333; }
        .deck-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px; }
        .mini-card { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); border: 3px solid #ffde00; border-radius: 12px; color: black; padding: 8px; font-size: 11px; box-shadow: 0 6px 12px rgba(0,0,0,0.4); aspect-ratio: 2.5 / 3.8; display: flex; flex-direction: column; cursor: pointer; text-align: left; }
        .mini-card img { width: 100%; height: 50%; object-fit: cover; border-radius: 6px; background: white; }
        .btn { background: #ffcb05; color: #3c5aa6; border: 2px solid #3c5aa6; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-red { background: #ff4444; color: white; border: none; }
        .btn-blue { background: #3498db; color: white; border: none; }
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #333; z-index: 1000; }
        .nav-item { color: #888; font-size: 10px; background: none; border: none; text-align: center; cursor: pointer; }
        .nav-item.active { color: #ffcb05; font-weight: bold; }
    </style>
</head>
<body>

    <div id="cardModal" class="modal hidden" onclick="closeModal(event)">
        <div class="modal-content" id="modalData" onclick="event.stopPropagation()"></div>
    </div>

    <div id="battlePage" class="page hidden">
        <div class="battle-area">
            <div>
                <p id="enemyName">Ellenség</p>
                <div class="hp-bar"><div id="enemyHpFill" class="hp-fill"></div><div id="enemyHpText" class="hp-text">1000 / 1000 HP</div></div>
                <div id="enemyHand" class="battle-hand"></div>
            </div>

            <div class="battlefield" id="battlefield">
                <p style="color: #555;">Kattints egy lapodra a támadáshoz!</p>
            </div>

            <div>
                <div class="hp-bar"><div id="myHpFill" class="hp-fill"></div><div id="myHpText" class="hp-text">1000 / 1000 HP</div></div>
                <p>Te (5 random lap a paklidból)</p>
                <div id="myHand" class="battle-hand"></div>
            </div>
            <button class="btn btn-red" onclick="tab('deckPage')">FELADÁS</button>
        </div>
    </div>

    <div id="loginPage" class="page">
        <h1 style="color:#ffcb05;">POKÉMON LOGIN</h1>
        <input type="text" id="uName" placeholder="Felhasználónév" style="width:80%; padding:15px; margin:10px;">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <div id="deckPage" class="page hidden">
        <h3>🎒 PAKLID (<span class="coins">0</span> 🪙)</h3>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <div id="friendsPage" class="page hidden">
        <h3>👥 BARÁTOK</h3>
        <button class="btn btn-blue" onclick="inviteFriend()">KÓDOM MÁSOLÁSA</button>
        <button class="btn" onclick="addFriend()">BARÁT +</button>
        <div id="friendsList" style="margin-top:20px;"></div>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item" onclick="tab('deckPage', this)">🎒 Pakli</button>
        <button class="nav-item" onclick="tab('friendsPage', this)">👥 Barátok</button>
    </nav>

<script>
    let player = null;
    let battleState = { myHp: 1000, enemyHp: 1000, myHand: [], enemyHand: [] };

    function auth() {
        const u = document.getElementById('uName').value.trim().toLowerCase();
        if(!u) return;
        let data = JSON.parse(localStorage.getItem('pk_v4_' + u));
        player = data || { username: u, money: 500, deck: [], friends: [] };
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        tab('deckPage');
    }

    function tab(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'deckPage') renderDeck();
        if(id === 'friendsPage') renderFriends();
    }

    /* HARC RENDSZER */
    function startBattle(friendIndex) {
        if(player.deck.length < 5) return alert("Legalább 5 lap kell a harchoz!");
        const friend = player.friends[friendIndex];
        
        // 5 random lap kiválasztása
        battleState.myHand = [...player.deck].sort(() => 0.5 - Math.random()).slice(0, 5);
        battleState.enemyHand = [...friend.d].sort(() => 0.5 - Math.random()).slice(0, 5);
        battleState.myHp = 1000;
        battleState.enemyHp = 1000;

        document.getElementById('enemyName').innerText = friend.n;
        tab('battlePage');
        renderBattle();
    }

    function renderBattle() {
        // Saját lapok (láthatóak)
        const myHandDiv = document.getElementById('myHand');
        myHandDiv.innerHTML = "";
        battleState.myHand.forEach((c, i) => {
            myHandDiv.innerHTML += `
                <div class="battle-card" onclick="attack(${i})">
                    <img src="${c.img}">
                    <b>${c.name}</b><br>DMG: ${c.hp}
                </div>`;
        });

        // Ellenség lapjai (rejtve)
        const enemyHandDiv = document.getElementById('enemyHand');
        enemyHandDiv.innerHTML = "";
        battleState.enemyHand.forEach(() => {
            enemyHandDiv.innerHTML += `<div class="enemy-card-back">?</div>`;
        });

        updateBattleUI();
    }

    function attack(cardIndex) {
        const myCard = battleState.myHand[cardIndex];
        const dmg = parseInt(myCard.hp);
        
        // Animáció: kirakjuk a pályára
        const field = document.getElementById('battlefield');
        field.innerHTML = `<div class="battle-card" style="width:100px; font-size:12px;"><img src="${myCard.img}"><b>${myCard.name}</b></div>`;
        
        // Sebzés
        battleState.enemyHp -= dmg;
        if(battleState.enemyHp < 0) battleState.enemyHp = 0;

        // Ellenfél visszatámad (szimuláció)
        setTimeout(() => {
            if(battleState.enemyHand.length > 0) {
                const enemyCard = battleState.enemyHand[Math.floor(Math.random()*battleState.enemyHand.length)];
                field.innerHTML += `<div class="battle-card" style="width:100px; font-size:12px; border-color: red;"><img src="${enemyCard.img}"><b>${enemyCard.name}</b></div>`;
                battleState.myHp -= parseInt(enemyCard.hp);
                if(battleState.myHp < 0) battleState.myHp = 0;
                updateBattleUI();
                checkWinner();
            }
        }, 1000);
    }

    function updateBattleUI() {
        document.getElementById('myHpFill').style.width = (battleState.myHp / 10) + "%";
        document.getElementById('myHpText').innerText = battleState.myHp + " / 1000 HP";
        document.getElementById('enemyHpFill').style.width = (battleState.enemyHp / 10) + "%";
        document.getElementById('enemyHpText').innerText = battleState.enemyHp + " / 1000 HP";
    }

    function checkWinner() {
        if(battleState.enemyHp <= 0) {
            alert("GYŐZTÉL! Kaptál 200 érmét!");
            player.money += 200; sync(); tab('deckPage');
        } else if(battleState.myHp <= 0) {
            alert("VESZTETTÉL! Próbáld meg legközelebb.");
            tab('deckPage');
        }
    }

    /* BARÁTOK */
    function renderFriends() {
        const list = document.getElementById('friendsList');
        list.innerHTML = "";
        player.friends.forEach((f, i) => {
            list.innerHTML += `
                <div style="background:#2a2a2a; padding:10px; margin:5px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
                    <b>${f.n}</b>
                    <button class="btn btn-red" style="width:auto; margin:0;" onclick="startBattle(${i})">⚔️ HARC</button>
                </div>`;
        });
    }

    function inviteFriend() {
        const code = btoa(JSON.stringify({n: player.username, d: player.deck}));
        navigator.clipboard.writeText(code);
        alert("Harci kód másolva!");
    }

    function addFriend() {
        let code = prompt("Barát kódja:");
        if(code) {
            try {
                let fData = JSON.parse(atob(code));
                player.friends.push(fData);
                sync(); renderFriends();
            } catch(e) { alert("Hiba!"); }
        }
    }

    function renderDeck() {
        const list = document.getElementById('deckList');
        list.innerHTML = "";
        document.querySelectorAll('.coins').forEach(e => e.innerText = player.money);
        player.deck.forEach((c, i) => {
            list.innerHTML += `<div class="mini-card"><img src="${c.img}"><b>${c.name}</b><small>HP: ${c.hp}</small></div>`;
        });
    }

    function sync() { localStorage.setItem('pk_v4_' + player.username, JSON.stringify(player)); }
</script>
</body>
</html>
