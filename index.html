<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Ipari Card Game</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#111;
padding:15px;
font-size:22px;
}

.container{
padding:20px;
}

input,select{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#ffcb05;
cursor:pointer;
margin:5px;
font-weight:bold;
}

.album{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#1a1a1a;
border-radius:20px;
padding:10px;
cursor:pointer;
}

.card img{
width:100%;
border-radius:12px;
}

.rarity{
font-size:12px;
opacity:0.8;
}

.hidden{
display:none;
}

.bigCard{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.back{
position:absolute;
top:20px;
left:20px;
}

.shop{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.chest{
background:#222;
padding:20px;
border-radius:15px;
}

</style>

</head>

<body>

<header>Ipari Card Game</header>

<div class="container">

<div id="login">

<h2>Bejelentkezés</h2>

<input id="email" placeholder="email">
<br>
<input id="password" type="password" placeholder="jelszó">

<br>

<button onclick="register()">Regisztráció</button>
<button onclick="login()">Belépés</button>

</div>

<div id="game" class="hidden">

<h3 id="coins">0 coin</h3>

<h2>Kártya készítés</h2>

<input id="cardName" placeholder="Kártya neve">
<input id="cardHP" placeholder="HP">
<input id="cardImg" placeholder="Kép URL">

<select id="rarity">
<option>Common</option>
<option>Uncommon</option>
<option>Rare</option>
<option>Epic</option>
<option>Legendary</option>
<option>Mythic</option>
<option>Exotic</option>
</select>

<br>

<button onclick="createCard()">Kártya mentése</button>

<h2>Album</h2>

<div id="album" class="album"></div>

<h2>Shop</h2>

<input id="creatorCode" placeholder="creator code">
<button onclick="useCode()">Redeem</button>

<div class="shop">

<div class="chest">
<button onclick="openChest(1)">Chest</button>
</div>

<div class="chest">
<button onclick="openChest(2)">Big Chest</button>
</div>

<div class="chest">
<button onclick="openChest(3)">Mega Chest</button>
</div>

</div>

</div>

</div>

<div id="cardView" class="bigCard hidden">

<button class="back" onclick="closeCard()">⬅</button>

<div id="bigCardContent"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "IDE_A_SAJAT_APIKEY",
authDomain: "IDE_A_SAJAT_AUTHDOMAIN",
projectId: "IDE_A_SAJAT_PROJECTID",
storageBucket: "IDE_A_SAJAT_STORAGE",
messagingSenderId: "IDE_A_SAJAT_ID",
appId: "IDE_A_SAJAT_APPID"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let coins=0

window.register = async function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

await createUserWithEmailAndPassword(auth,email,password)

alert("Sikeres regisztráció")

}

window.login = async function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,password)

document.getElementById("login").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

loadCards()

}

window.createCard = async function(){

const name=cardName.value
const hp=cardHP.value
const img=cardImg.value
const rarityValue=rarity.value

await addDoc(collection(db,"cards"),{
name,
hp,
img,
rarity:rarityValue
})

alert("Kártya mentve")

loadCards()

}

async function loadCards(){

const snapshot=await getDocs(collection(db,"cards"))

album.innerHTML=""

snapshot.forEach(async d=>{

const c=d.data()

if(c.name && c.name.toLowerCase()=="zoli"){
await deleteDoc(doc(db,"cards",d.id))
return
}

album.innerHTML+=`

<div class="card" onclick="openCard('${c.name}','${c.img}','${c.hp}','${c.rarity}')">

<h3>${c.name}</h3>

<img src="${c.img}">

<p>HP ${c.hp}</p>

<div class="rarity">${c.rarity || ""}</div>

</div>

`

})

}

window.openCard=(name,img,hp,rarity)=>{

cardView.classList.remove("hidden")

bigCardContent.innerHTML=`

<div class="card" style="width:250px">

<h2>${name}</h2>

<img src="${img}">

<p>HP ${hp}</p>

<p>${rarity}</p>

</div>

`

}

window.closeCard=()=>{

cardView.classList.add("hidden")

}

window.useCode=()=>{

if(localStorage.getItem("codeUsed")){

alert("Már használtad")

return

}

if(creatorCode.value.toLowerCase()=="zserko"){

coins+=1000

localStorage.setItem("codeUsed","yes")

updateCoins()

alert("+1000 coin")

}

}

function updateCoins(){

coins.innerText=coins+" coin"

}

window.openChest=(type)=>{

let reward=0

if(type==1) reward=50
if(type==2) reward=120
if(type==3) reward=250

coins+=reward

alert("3 kártya + "+reward+" coin")

updateCoins()

}

</script>

</body>
</html>
