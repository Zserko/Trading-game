<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon TCG Social</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .page { padding: 15px; text-align: center; min-height: 100vh; }
        
        /* KÁRTYA MEGJELENÉS */
        .deck-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px; }
        .mini-card { 
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); 
            border: 3px solid #ffde00; border-radius: 12px; color: black; padding: 8px; 
            font-size: 11px; position: relative; text-align: left; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); aspect-ratio: 2.5 / 3.8; 
            display: flex; flex-direction: column; cursor: pointer;
        }
        .mini-card img { width: 100%; height: 50%; object-fit: cover; border-radius: 6px; background: white; }

        /* MODAL / POPUP */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .modal-content { background: #1e1e1e; padding: 20px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; border: 2px solid #333; }

        /* PROFIL & BARÁTOK */
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #ffcb05; margin-bottom: 10px; }
        .friend-item { background: #2a2a2a; padding: 10px; border-radius: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }

        /* GOMBOK */
        .btn { background: #ffcb05; color: #3c5aa6; border: 2px solid #3c5aa6; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-red { background: #ff4444; color: white; border: none; }
        .btn-blue { background: #3498db; color: white; border: none; }

        /* NAVBAR */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #333; z-index: 1000; }
        .nav-item { color: #888; font-size: 10px; background: none; border: none; text-align: center; cursor: pointer; }
        .nav-item.active { color: #ffcb05; font-weight: bold; }

        /* VIZUÁLIS SZERKESZTŐ (Maradt a régi) */
        .visual-editor { background: linear-gradient(to bottom, #e0e0e0, #a0a0a0); border: 10px solid #fcd33b; border-radius: 15px; width: 100%; max-width: 300px; aspect-ratio: 2.5/3.5; margin: 0 auto; position: relative; color: black; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="cardModal" class="modal hidden">
        <div class="modal-content" id="modalData"></div>
    </div>

    <div id="loginPage" class="page">
        <h1 style="color:#ffcb05;">POKÉMON LOGIN</h1>
        <input type="text" id="uName" placeholder="Felhasználónév" style="width:80%; padding:10px; margin:5px;">
        <input type="password" id="uPass" placeholder="Jelszó" style="width:80%; padding:10px; margin:5px;">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <div id="editorPage" class="page hidden">
        <div class="visual-editor">
            <div onclick="askData('inName', 'Név', 'dispName')">✏️ <span id="dispName">Név</span></div>
            <div onclick="askData('inHP', 'HP', 'dispHP')">✏️ HP <span id="dispHP">0</span></div>
            <div style="height:50%; background:white; margin:10px 0;" onclick="document.getElementById('fileIn').click()">
                <img id="dispImg" style="width:100%; height:100%; object-fit:cover; display:none;">
                <span id="imgPlaceholder">➕ KÉP</span>
            </div>
            <div onclick="askData('inAdv', 'Képesség', 'dispAdv')">✏️ <span id="dispAdv">Képesség...</span></div>
            <input type="hidden" id="inName"><input type="hidden" id="inHP"><input type="hidden" id="inAdv">
            <input type="file" id="fileIn" class="hidden" onchange="loadImg(this)">
        </div>
        <button class="btn" onclick="save()">MENTÉS (50 🪙)</button>
    </div>

    <div id="deckPage" class="page hidden">
        <h3>🎒 PAKLID (<span class="coins">0</span> 🪙)</h3>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <div id="friendsPage" class="page hidden">
        <h3>👥 BARÁTOK</h3>
        <button class="btn btn-blue" onclick="inviteFriend()">➕ MEGHÍVÓ KÓD MÁSOLÁSA</button>
        <button class="btn" onclick="addFriend()">📥 BARÁT HOZZÁADÁSA KÓDDAL</button>
        <div id="friendsList" style="margin-top:20px;"></div>
    </div>

    <div id="profilePage" class="page hidden">
        <h3>👤 PROFIL</h3>
        <img id="profPicDisp" class="profile-pic" src="https://via.placeholder.com/100" onclick="document.getElementById('profFile').click()">
        <input type="file" id="profFile" class="hidden" onchange="loadProfPic(this)">
        <h2 id="profNameDisp">Felhasználó</h2>
        <button class="btn" onclick="rename()">NÉV ÁTÍRÁSA</button>
        <div class="btn-blue" style="padding:15px; border-radius:10px; margin-top:20px;">
            Statisztika: <br> <span id="statCards">0</span> kártya | <span class="coins">0</span> 🪙
        </div>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item active" onclick="tab('editorPage', this)">🎨<br>Készítő</button>
        <button class="nav-item" onclick="tab('deckPage', this)">🎒<br>Pakli</button>
        <button class="nav-item" onclick="tab('friendsPage', this)">👥<br>Barátok</button>
        <button class="nav-item" onclick="tab('profilePage', this)">👤<br>Profil</button>
    </nav>

<script>
    let player = null;
    let tempPic = "";

    function auth() {
        const u = document.getElementById('uName').value.trim().toLowerCase();
        const p = document.getElementById('uPass').value;
        if(!u) return;
        let data = JSON.parse(localStorage.getItem('pk_v3_' + u));
        player = data || { username: u, password: p, money: 500, deck: [], friends: [], pPic: "" };
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        updateUI();
        tab('deckPage', document.querySelectorAll('.nav-item')[1]);
    }

    function tab(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(b) b.classList.add('active');
        if(id === 'deckPage') renderDeck();
        if(id === 'friendsPage') renderFriends();
        if(id === 'profilePage') updateUI();
    }

    /* KÁRTYA INTERAKCIÓK */
    function openCard(i) {
        const c = player.deck[i];
        const modal = document.getElementById('cardModal');
        const content = document.getElementById('modalData');
        modal.classList.remove('hidden');
        content.innerHTML = `
            <img src="${c.img}" style="width:100%; border-radius:10px;">
            <h2>${c.name}</h2>
            <p>HP: ${c.hp} | ${c.adv}</p>
            <button class="btn btn-blue" onclick="upgradeCard(${i})">UPGRADE (+100HP) - 150🪙</button>
            <button class="btn btn-red" onclick="quickSell(${i})">QUICKSELL (+75🪙)</button>
            <button class="btn" onclick="document.getElementById('cardModal').classList.add('hidden')">BEZÁRÁS</button>
        `;
    }

    function upgradeCard(i) {
        if(player.money < 150) return alert("Nincs elég pénzed!");
        player.money -= 150;
        player.deck[i].hp = parseInt(player.deck[i].hp) + 100;
        sync(); openCard(i); updateUI();
    }

    function quickSell(i) {
        player.money += 75;
        player.deck.splice(i, 1);
        document.getElementById('cardModal').classList.add('hidden');
        sync(); renderDeck(); updateUI();
    }

    /* PROFIL ÉS BARÁTOK */
    function rename() {
        let n = prompt("Új név:");
        if(n) { player.username = n; sync(); updateUI(); }
    }

    function inviteFriend() {
        const code = btoa(JSON.stringify({n: player.username, d: player.deck.slice(0,5), p: player.pPic}));
        navigator.clipboard.writeText(code);
        alert("Meghívó kód másolva! Küldd el egy barátodnak.");
    }

    function addFriend() {
        let code = prompt("Másold be a barátod kódját:");
        if(code) {
            try {
                let fData = JSON.parse(atob(code));
                player.friends.push(fData);
                sync(); renderFriends();
            } catch(e) { alert("Érvénytelen kód!"); }
        }
    }

    function renderFriends() {
        const list = document.getElementById('friendsList');
        list.innerHTML = player.friends.length ? "" : "Még nincsenek barátaid.";
        player.friends.forEach((f, i) => {
            list.innerHTML += `
                <div class="friend-item">
                    <span>${f.n}</span>
                    <button class="btn btn-blue" style="width:auto; margin:0;" onclick="viewFriendDeck(${i})">LAPOK</button>
                </div>`;
        });
    }

    function viewFriendDeck(i) {
        const f = player.friends[i];
        alert(f.n + " legjobb lapjai: " + f.d.map(c => c.name).join(", "));
    }

    /* ALAP FUNKCIÓK */
    function askData(id, txt, disp) {
        let a = prompt(txt);
        if(a) { document.getElementById(id).value = a; document.getElementById(disp).innerText = a; }
    }

    function loadImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => { 
            tempPic = e.target.result; 
            document.getElementById('dispImg').src = tempPic;
            document.getElementById('dispImg').style.display = 'block';
            document.getElementById('imgPlaceholder').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function loadProfPic(input) {
        const reader = new FileReader();
        reader.onload = (e) => { player.pPic = e.target.result; sync(); updateUI(); };
        reader.readAsDataURL(input.files[0]);
    }

    function save() {
        if(!tempPic || !document.getElementById('inName').value) return alert("Hiányzó adatok!");
        if(player.money < 50) return alert("Nincs pénzed!");
        player.money -= 50;
        player.deck.push({ name: document.getElementById('inName').value, hp: document.getElementById('inHP').value, adv: document.getElementById('inAdv').value, img: tempPic });
        sync(); updateUI(); alert("Kész!");
    }

    function renderDeck() {
        const list = document.getElementById('deckList');
        list.innerHTML = "";
        player.deck.forEach((c, i) => {
            list.innerHTML += `<div class="mini-card" onclick="openCard(${i})"><img src="${c.img}"><b>${c.name}</b><small>HP: ${c.hp}</small></div>`;
        });
    }

    function updateUI() {
        document.querySelectorAll('.coins').forEach(e => e.innerText = player.money);
        document.getElementById('profNameDisp').innerText = player.username;
        document.getElementById('statCards').innerText = player.deck.length;
        if(player.pPic) document.getElementById('profPicDisp').src = player.pPic;
    }

    function sync() { localStorage.setItem('pk_v3_' + player.username, JSON.stringify(player)); }
</script>
</body>
</html>
