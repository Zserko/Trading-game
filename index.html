<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ipari 1v1</title>
    <style>
        :root {
            --common: #888; --uncommon: #2ecc71; --rare: #3498db; 
            --epic: #9b59b6; --legendary: #f1c40f; --mythic: #e74c3c; --exotic: #00ffee;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .hidden { display: none !important; }
        .page { padding: 20px; text-align: center; min-height: 100vh; }
        
        /* CÍM ÉS KÁRTYA STÍLUSOK */
        .header-title { color: #ffcb05; font-size: 32px; font-weight: 800; text-transform: uppercase; margin: 30px 0; }
        .deck-grid { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        
        .big-card { 
            background: #222; border: 4px solid var(--common); border-radius: 20px; color: white; padding: 12px; 
            width: 80%; max-width: 300px; position: relative; text-align: left; transition: 0.3s;
        }
        .big-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; background: #111; }
        .rarity-label { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .locked { filter: grayscale(1); opacity: 0.5; }

        /* NAVIGÁCIÓ */
        .navbar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid #222; z-index: 1000; }
        .nav-item { color: #666; background: none; border: none; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #ffcb05; font-weight: bold; }

        /* MODAL ÉS GOMBOK */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; padding-top: 20px; overflow-y: auto; }
        .btn { background: #ffcb05; color: #3c5aa6; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-red { background: #ff4444; color: white; }
        .back-btn { align-self: flex-start; margin-left: 20px; background: #333; color: white; border: none; padding: 10px; border-radius: 10px; }
        
        .input-box { width: 85%; padding: 15px; border-radius: 12px; border: 2px solid #333; background: #1a1a1a; color: white; margin-bottom: 10px; text-align: center; }
        select { width: 95%; padding: 10px; border-radius: 10px; background: #333; color: white; border: none; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="friendDetail" class="modal hidden">
        <button class="back-btn" onclick="document.getElementById('friendDetail').classList.add('hidden')">⬅ Vissza</button>
        <div id="fDetailContent" style="width: 90%; text-align: center;">
            <img id="fPic" style="width:100px; height:100px; border-radius:50%; border:3px solid #ffcb05; margin-top:20px;">
            <h2 id="fName">Név</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-red" id="removeFriendBtn">Barát törlése</button>
                <button class="btn" onclick="alert('Meghívó elküldve!')">Játék ⚔️</button>
            </div>
            <hr style="border:1px solid #222; margin:20px 0;">
            <h3>Kártyái</h3>
            <div id="fCards" class="deck-grid"></div>
        </div>
    </div>

    <div id="loginPage" class="page">
        <div class="header-title">Ipari 1v1</div>
        <input type="text" id="uName" class="input-box" placeholder="Felhasználónév">
        <input type="password" id="uPass" class="input-box" placeholder="Jelszó">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <div id="albumPage" class="page hidden">
        <h2>📖 Album</h2>
        <p style="font-size: 12px; color: #888;">Az összes létező kártya a játékban</p>
        <div id="albumList" class="deck-grid"></div>
    </div>

    <div id="deckPage" class="page hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🎒 Paklid</h2>
            <div style="background:#ffcb05; color:black; padding:5px 12px; border-radius:15px; font-weight:bold;"><span class="coinCount">0</span> 🪙</div>
        </div>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <div id="editorPage" class="page hidden">
        <h2>🎨 Kártya Készítő</h2>
        <div class="big-card" id="editorPreview" style="margin: 0 auto;">
            <div class="rarity-label" id="pRare">Common</div>
            <div id="eHp" style="float:right; color:red; font-weight:bold;">HP 0</div>
            <div id="eName" style="font-weight:bold; margin-bottom:10px;">Név...</div>
            <div style="height:150px; background:#111; border-radius:10px; display:flex; align-items:center; justify-content:center; overflow:hidden;" onclick="document.getElementById('fileIn').click()">
                <img id="eImg" style="display:none; width:100%; height:100%; object-fit:cover;">
                <span>➕ KÉP</span>
            </div>
            <select id="rarityIn" onchange="updateEditorStyle()">
                <option value="Common">Common</option>
                <option value="Uncommon">Uncommon</option>
                <option value="Rare">Rare</option>
                <option value="Epic">Epic</option>
                <option value="Legendary">Legendary</option>
                <option value="Mythic">Mythic</option>
                <option value="Exotic">Exotic</option>
            </select>
            <input type="file" id="fileIn" class="hidden" onchange="loadImg(this)">
            <button class="btn" onclick="saveCard()">MENTÉS (50 🪙)</button>
        </div>
    </div>

    <div id="friendsPage" class="page hidden">
        <h2>👥 Barátok</h2>
        <button class="btn" onclick="addFriend()">Barát hozzáadása (Kód)</button>
        <div id="friendsList" style="margin-top:20px;"></div>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item active" onclick="tab('deckPage', this)">🎒 Pakli</button>
        <button class="nav-item" onclick="tab('albumPage', this)">📖 Album</button>
        <button class="nav-item" onclick="tab('editorPage', this)">🎨 Készítő</button>
        <button class="nav-item" onclick="tab('friendsPage', this)">👥 Barátok</button>
    </nav>

<script>
    let player = null;
    let tempImg = "";
    const rarities = {
        Common: '#888', Uncommon: '#2ecc71', Rare: '#3498db', 
        Epic: '#9b59b6', Legendary: '#f1c40f', Mythic: '#e74c3c', Exotic: '#00ffee'
    };

    function auth() {
        const u = document.getElementById('uName').value.trim().toLowerCase();
        const p = document.getElementById('uPass').value;
        if(!u || !p) return;
        let data = JSON.parse(localStorage.getItem('ipari_v4_' + u));
        player = data || { username: u, password: p, money: 500, deck: [], friends: [], pPic: "" };
        if(player.password !== p) return alert("Hiba!");
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        tab('deckPage');
    }

    function sync() { localStorage.setItem('ipari_v4_' + player.username.toLowerCase(), JSON.stringify(player)); }

    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(btn) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        }
        if(id === 'deckPage') renderDeck();
        if(id === 'albumPage') renderAlbum();
        if(id === 'friendsPage') renderFriends();
        document.querySelectorAll('.coinCount').forEach(e => e.innerText = player.money);
    }

    // SZERKESZTŐ ÉS RITKASÁG
    function updateEditorStyle() {
        const r = document.getElementById('rarityIn').value;
        const card = document.getElementById('editorPreview');
        card.style.borderColor = rarities[r];
        document.getElementById('pRare').innerText = r;
        document.getElementById('pRare').style.color = rarities[r];
    }

    function loadImg(i) {
        const r = new FileReader();
        r.onload = (e) => { tempImg = e.target.result; document.getElementById('eImg').src = tempImg; document.getElementById('eImg').style.display='block'; };
        r.readAsDataURL(i.files[0]);
    }

    function saveCard() {
        let n = prompt("Pokémon neve:");
        let h = prompt("HP:");
        if(!n || !tempImg) return;
        let c = { id: Date.now(), name: n, hp: h, rare: document.getElementById('rarityIn').value, img: tempImg };
        player.deck.push(c);
        
        // Mentés a globális listába is az Albumhoz
        let global = JSON.parse(localStorage.getItem('ipari_global_cards')) || [];
        global.push(c);
        localStorage.setItem('ipari_global_cards', JSON.stringify(global));

        player.money -= 50;
        sync(); tab('deckPage');
    }

    // MEGJELENÍTÉS (PAKLI)
    function renderDeck() {
        const l = document.getElementById('deckList');
        l.innerHTML = "";
        player.deck.forEach(c => {
            l.innerHTML += createCardHTML(c);
        });
    }

    // GYŰJTEMÉNY (ALBUM) LOGIKA
    function renderAlbum() {
        const l = document.getElementById('albumList');
        const global = JSON.parse(localStorage.getItem('ipari_global_cards')) || [];
        l.innerHTML = "";
        
        // Egyedi kártyák szűrése név alapján
        const uniqueCards = [];
        const map = new Map();
        for (const item of global) {
            if(!map.has(item.name)){
                map.set(item.name, true);
                uniqueCards.push(item);
            }
        }

        uniqueCards.forEach(c => {
            const isOwned = player.deck.some(pc => pc.name === c.name);
            l.innerHTML += createCardHTML(c, !isOwned);
        });
    }

    function createCardHTML(c, isLocked = false) {
        return `
            <div class="big-card ${isLocked ? 'locked' : ''}" style="border-color: ${rarities[c.rare]}">
                <div class="rarity-label" style="color:${rarities[c.rare]}">${c.rare}</div>
                <div style="float:right; color:red; font-weight:bold;">HP ${isLocked ? '???' : c.hp}</div>
                <div style="font-weight:bold; margin-bottom:5px;">${isLocked ? '???' : c.name}</div>
                <img src="${c.img}">
            </div>`;
    }

    // BARÁTOK RÉSZLETESEN
    function renderFriends() {
        const l = document.getElementById('friendsList');
        l.innerHTML = "";
        player.friends.forEach((f, i) => {
            l.innerHTML += `
                <div class="input-box" onclick="showFriend(${i})" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                    <span>${f.username}</span> <span>▶</span>
                </div>`;
        });
    }

    function showFriend(i) {
        const f = player.friends[i];
        const modal = document.getElementById('friendDetail');
        modal.classList.remove('hidden');
        document.getElementById('fName').innerText = f.username;
        document.getElementById('fPic').src = f.pPic || 'https://via.placeholder.com/100';
        
        const cardContainer = document.getElementById('fCards');
        cardContainer.innerHTML = "";
        f.deck.forEach(c => { cardContainer.innerHTML += createCardHTML(c); });

        document.getElementById('removeFriendBtn').onclick = () => {
            player.friends.splice(i, 1);
            sync(); modal.classList.add('hidden'); renderFriends();
        };
    }

    function addFriend() {
        let code = prompt("Másold be a barátod kódját (vagy nevét a teszthez):");
        if(code) {
            // Itt most egy egyszerű szimulációt teszek bele a kód kedvéért
            player.friends.push({ username: code, pPic: "", deck: [{name: "Barát Lapja", hp: 500, rare: "Epic", img: "https://via.placeholder.com/200"}] });
            sync(); renderFriends();
        }
    }
</script>
</body>
</html>
