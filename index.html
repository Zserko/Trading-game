<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ipari 1v1</title>
    <style>
        :root {
            --common: #888; --uncommon: #2ecc71; --rare: #3498db; 
            --epic: #9b59b6; --legendary: #f1c40f; --mythic: #e74c3c; --exotic: #00ffee;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0a0a0a; 
            color: white; 
            margin: 0; 
            padding-bottom: 120px; 
            overflow-x: hidden;
        }
        .hidden { display: none !important; }
        .page { padding: 20px; text-align: center; min-height: 100vh; }
        
        /* NAGY KÁRTYA DESIGN */
        .deck-grid { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .big-card { 
            background: #1a1a1a; 
            border: 5px solid var(--common); 
            border-radius: 25px; 
            color: white; 
            padding: 15px; 
            width: 300px; 
            position: relative; 
            text-align: left; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
        }
        .img-container { 
            width: 100%; height: 210px; 
            border-radius: 15px; background: #111; 
            border: 1px solid #333; overflow: hidden; position: relative; 
        }
        .big-card img { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1);
            max-width: none;
        }
        .rarity-label { font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .hp-badge { float: right; color: #ff4444; font-weight: bold; font-size: 20px; }
        .card-desc { margin-top: 10px; font-size: 14px; color: #bbb; min-height: 20px; }

        /* FIX NAVBAR */
        .navbar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #111; 
            display: flex; justify-content: space-around; padding: 20px 0; 
            border-top: 3px solid #222; z-index: 1000;
        }
        .nav-item { 
            color: #666; background: none; border: none; font-size: 13px; 
            font-weight: bold; cursor: pointer; 
        }
        .nav-item.active { color: #ffcb05; }

        /* INPUTOK */
        .input-box { width: 85%; padding: 15px; border-radius: 12px; border: 2px solid #333; background: #1a1a1a; color: white; margin-bottom: 10px; text-align: center; font-size: 16px; }
        .btn { background: #ffcb05; color: #3c5aa6; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 90%; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-red { background: #ff4444; color: white; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .back-btn { align-self: flex-start; margin-left: 20px; background: #333; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="cardModal" class="modal hidden">
        <button class="back-btn" onclick="document.getElementById('cardModal').classList.add('hidden')">⬅ Vissza</button>
        <div id="modalData" style="margin-top: 40px;"></div>
    </div>

    <div id="loginPage" class="page">
        <div style="color: #ffcb05; font-size: 40px; font-weight: 800; margin: 50px 0;">Ipari 1v1</div>
        <input type="text" id="uName" class="input-box" placeholder="Felhasználónév">
        <input type="password" id="uPass" class="input-box" placeholder="Jelszó">
        <button class="btn" onclick="auth()">BELÉPÉS</button>
    </div>

    <div id="editorPage" class="page hidden">
        <h2 style="color:#ffcb05">🎨 Kártya Készítő</h2>
        <div class="big-card" id="preview" style="margin: 0 auto;">
            <div class="rarity-label" id="pRare">Common</div>
            <div class="hp-badge" id="pHPText">HP 0</div>
            <div id="pNameText" style="font-weight:bold; font-size: 20px; margin-bottom:10px;">Név...</div>
            <div class="img-container" onclick="document.getElementById('fileIn').click()">
                <img id="eImg" style="display:none;">
                <span id="plus" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#555;">➕ KÉP FELTÖLTÉSE</span>
            </div>
            <div class="card-desc" id="pDescText">Leírás...</div>
            <input type="file" id="fileIn" class="hidden" onchange="loadImg(this)">
        </div>

        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center;">
            <input type="text" id="iName" class="input-box" placeholder="Név" oninput="syncPreview()">
            <input type="number" id="iHP" class="input-box" placeholder="HP" oninput="syncPreview()">
            <input type="text" id="iDesc" class="input-box" placeholder="Leírás" oninput="syncPreview()">
            <div style="width: 85%; text-align: left;"><label style="font-size:12px; color:#888;">Méret:</label><input type="range" id="iScale" min="0.1" max="3" step="0.1" value="1" style="width:100%" oninput="syncPreview()"></div>
            <select id="iRare" class="input-box" onchange="syncPreview()">
                <option value="Common">Common</option><option value="Uncommon">Uncommon</option><option value="Rare">Rare</option><option value="Epic">Epic</option><option value="Legendary">Legendary</option><option value="Mythic">Mythic</option><option value="Exotic">Exotic</option>
            </select>
            <button class="btn" onclick="saveCard()">MENTÉS (50 🪙)</button>
        </div>
    </div>

    <div id="deckPage" class="page hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2 style="margin:0;">🎒 Paklid</h2>
            <b style="color:#ffcb05; font-size: 20px;"><span id="coins">0</span> 🪙</b>
        </div>
        <div id="deckList" class="deck-grid"></div>
    </div>

    <div id="profilePage" class="page hidden">
        <h2 style="color:#ffcb05">👤 Profil</h2>
        <div id="pNameDisp" style="font-size:32px; font-weight:bold; margin: 40px 0;"></div>
        <button class="btn btn-red" onclick="location.reload()">KIJELENTKEZÉS</button>
    </div>

    <nav class="navbar hidden" id="menu">
        <button class="nav-item active" onclick="tab('deckPage', this)">🎒 Pakli</button>
        <button class="nav-item" onclick="tab('editorPage', this)">🎨 Készítő</button>
        <button class="nav-item" onclick="tab('profilePage', this)">👤 Profil</button>
    </nav>

<script>
    let player = null;
    let tempImg = "";

    function auth() {
        const u = document.getElementById('uName').value.trim().toLowerCase();
        const p = document.getElementById('uPass').value;
        if(!u || !p) return alert("Hiányzó adatok!");
        
        let data = JSON.parse(localStorage.getItem('ipari_v8_' + u));
        if(data) {
            if(data.password !== p) return alert("Hibás jelszó!");
            player = data;
        } else {
            player = { username: u, password: p, money: 500, deck: [] };
        }
        
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menu').classList.remove('hidden');
        tab('deckPage');
    }

    function syncPreview() {
        document.getElementById('pNameText').innerText = document.getElementById('iName').value || "Név...";
        document.getElementById('pHPText').innerText = "HP " + (document.getElementById('iHP').value || "0");
        document.getElementById('pDescText').innerText = document.getElementById('iDesc').value || "Leírás...";
        const r = document.getElementById('iRare').value;
        const color = varColor(r);
        document.getElementById('preview').style.borderColor = color;
        document.getElementById('pRare').innerText = r;
        document.getElementById('pRare').style.color = color;
        const scale = document.getElementById('iScale').value;
        document.getElementById('eImg').style.transform = `translate(-50%, -50%) scale(${scale})`;
    }

    function varColor(r) {
        const colors = { Common:'#888', Uncommon:'#2ecc71', Rare:'#3498db', Epic:'#9b59b6', Legendary:'#f1c40f', Mythic:'#e74c3c', Exotic:'#00ffee' };
        return colors[r];
    }

    function loadImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                tempImg = e.target.result;
                document.getElementById('eImg').src = tempImg;
                document.getElementById('eImg').style.display = 'block';
                document.getElementById('plus').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveCard() {
        if(!tempImg || !document.getElementById('iName').value) return alert("Név és kép kötelező!");
        if(player.money < 50) return alert("Nincs elég pénzed!");
        player.deck.push({
            name: document.getElementById('iName').value,
            hp: document.getElementById('iHP').value || 0,
            desc: document.getElementById('iDesc').value || "",
            rare: document.getElementById('iRare').value,
            scale: document.getElementById('iScale').value,
            img: tempImg
        });
        player.money -= 50;
        localStorage.setItem('ipari_v8_'+player.username, JSON.stringify(player));
        tab('deckPage');
    }

    function tab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(btn) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        }
        if(id === 'deckPage') renderDeck();
        if(id === 'profilePage') document.getElementById('pNameDisp').innerText = player.username;
        document.getElementById('coins').innerText = player.money;
    }

    function renderDeck() {
        const list = document.getElementById('deckList');
        list.innerHTML = "";
        player.deck.forEach((c, i) => {
            list.innerHTML += `
                <div class="big-card" style="border-color:${varColor(c.rare)}" onclick="openDetail(${i})">
                    <div class="rarity-label" style="color:${varColor(c.rare)}">${c.rare}</div>
                    <div class="hp-badge">HP ${c.hp}</div>
                    <div style="font-weight:bold; font-size:18px; margin-bottom:10px;">${c.name}</div>
                    <div class="img-container"><img src="${c.img}" style="transform: translate(-50%, -50%) scale(${c.scale})"></div>
                    <div class="card-desc">${c.desc}</div>
                </div>`;
        });
    }

    function openDetail(i) {
        const c = player.deck[i];
        const modal = document.getElementById('cardModal');
        modal.classList.remove('hidden');
        document.getElementById('modalData').innerHTML = `
            <div class="big-card" style="border-color:${varColor(c.rare)}; width:300px">
                <div class="rarity-label" style="color:${varColor(c.rare)}">${c.rare}</div>
                <div class="hp-badge">HP ${c.hp}</div>
                <div style="font-weight:bold; font-size:20px; margin-bottom:10px;">${c.name}</div>
                <div class="img-container" style="height:210px"><img src="${c.img}" style="transform: translate(-50%, -50%) scale(${c.scale})"></div>
                <div class="card-desc">${c.desc}</div>
            </div>
            <button class="btn btn-red" style="margin-top:30px;" onclick="deleteCard(${i})">TÖRLÉS (+25 🪙)</button>
        `;
    }

    function deleteCard(i) {
        player.deck.splice(i, 1);
        player.money += 25;
        localStorage.setItem('ipari_v8_'+player.username, JSON.stringify(player));
        document.getElementById('cardModal').classList.add('hidden');
        renderDeck();
        document.getElementById('coins').innerText = player.money;
    }
</script>
</body>
</html>
